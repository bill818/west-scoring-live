<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WEST Scoring Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #111111;
  --red: #b82025;
  --white: #ffffff;
  --off-white: #f5f5f5;
  --border: #e2e2e2;
  --text-muted: #777;
  --text-body: #333;
  --green: #2e7d32;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--off-white);color:var(--text-body);font-family:'Source Sans 3',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--black);border-bottom:3px solid var(--red);}
.header-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:56px;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;color:#fff;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;text-decoration:none;min-width:44px;min-height:44px;padding:0;background:none;border:none;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.back-btn:hover{color:var(--red);}
.logo-tap{display:flex;align-items:center;gap:8px;text-decoration:none;margin-left:auto;}
.logo-img{height:26px;width:auto;filter:invert(1);}
.logo-west{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:#fff;}
.logo-sep{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);margin:0 3px;}
.logo-scoring{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);letter-spacing:.04em;}

/* BREADCRUMBS */
.breadcrumbs{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:0;min-height:40px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.breadcrumbs::-webkit-scrollbar{display:none;}
.bc-home{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--red);text-decoration:none;padding:10px 10px 10px 0;white-space:nowrap;flex-shrink:0;}
.bc-home:hover{color:var(--black);}
.bc-sep{font-family:'DM Mono',monospace;font-size:11px;color:#ccc;padding:0 6px;flex-shrink:0;user-select:none;}
.bc-link{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--red);text-decoration:none;padding:10px 0;white-space:nowrap;flex-shrink:0;}
.bc-link:hover{border-bottom:1px solid var(--red);}
.bc-current{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--text-muted);padding:10px 0;white-space:nowrap;flex-shrink:0;}

/* TITLE BAR */
.title-bar{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px 12px;}
.title-classnum{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:2px;}
.title-main{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--black);line-height:1.2;}
.title-meta{display:flex;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap;}
.title-type{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.06em;}
.title-sponsor{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}
.stats-btn{display:none;margin-top:10px;background:none;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:6px 12px;cursor:pointer;text-decoration:none;}
.stats-btn:hover{border-color:var(--black);color:var(--black);}
.stats-btn.visible{display:inline-block;}
.judges-btn{margin-top:10px;margin-right:8px;background:none;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:6px 12px;cursor:pointer;}
.judges-btn:hover{border-color:var(--black);color:var(--black);}
.judges-btn.active{background:var(--black);color:#fff;border-color:var(--black);}
.split-pill{display:inline-flex;align-items:center;gap:5px;margin-top:10px;margin-left:4px;background:var(--red);color:#fff;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:2px;font-weight:600;}

/* BY-JUDGE VIEW — judge sections on results page */
.by-judge-view .judge-section{margin-bottom:20px;}
.by-judge-view .judge-section:last-child{margin-bottom:0;}
.by-judge-view .judge-section-hdr{background:#f5f5f5;border-top:2px solid var(--black);border-bottom:1px solid var(--border);padding:10px 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--black);font-weight:600;}
.live-pill{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:2px;}
.live-blink{width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* LIVE BUTTON */
.live-banner{display:flex;align-items:center;gap:10px;background:#fff;border-bottom:3px solid var(--red);padding:12px 16px;text-decoration:none;color:inherit;transition:background .1s;cursor:pointer;}
.live-banner:hover{background:#fff8f8;}
.live-blink{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1.6s ease-in-out infinite;flex-shrink:0;}
.live-banner-text{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);font-weight:600;flex:1;}
.live-banner-arrow{font-size:18px;color:var(--red);flex-shrink:0;font-weight:700;}

/* RESULTS */
.results-wrap{padding-bottom:60px;}
.result-entry{display:block;border-bottom:1px solid var(--border);background:#fff;}
.result-entry:nth-child(even){background:#fafafa;}
.result-main{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;}
.r-ribbon{flex-shrink:0;width:32px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.r-place-txt{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--black);line-height:1;}
.r-bib{display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--text-muted);border:1px solid var(--border);border-radius:3px;padding:1px 5px;margin-right:5px;background:#fafafa;vertical-align:middle;flex-shrink:0;}
.r-info{flex:1;min-width:0;}
.r-horse-line{display:flex;align-items:baseline;gap:0 6px;line-height:1.3;min-width:0;flex-wrap:nowrap;}
.r-horse-rider{display:flex;align-items:baseline;flex-wrap:wrap;gap:0 6px;min-width:0;flex:1;}
.r-horse{font-size:15px;font-weight:600;color:var(--black);}
.r-rider-inline{font-size:13px;color:var(--text-muted);}
.r-flag{margin-left:4px;vertical-align:baseline;position:relative;top:1px;}
.r-breeding{font-size:11px;color:#bbb;font-style:italic;margin-top:1px;padding-left:38px;}
.r-owner{font-size:12px;color:#aaa;font-style:italic;margin-top:1px;padding-left:38px;}
.r-locale{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;margin-top:1px;padding-left:38px;}
.r-scores{flex-shrink:0;text-align:right;font-family:'DM Mono',monospace;min-width:70px;}
.r-score-row{display:flex;align-items:baseline;justify-content:flex-end;gap:5px;margin-top:2px;}
.r-score-lbl{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#bbb;}
.r-score-val{font-size:13px;color:var(--text-muted);}
.r-score-val.primary{font-size:14px;font-weight:600;color:var(--red);}
.r-score-val.clean{color:var(--green);font-weight:600;}
.r-total{font-size:14px;font-weight:700;color:var(--black);margin-top:3px;border-top:1px solid var(--border);padding-top:3px;text-align:right;}
.r-status{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.06em;text-transform:uppercase;}
.no-results{text-align:center;padding:50px 20px;color:var(--text-muted);font-size:14px;}

/* DERBY — movement arrow, expand panel, judge summary */
.r-move{flex-shrink:0;width:22px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;text-align:center;margin-right:2px;line-height:1.2;padding-top:2px;}
.r-move.up{color:var(--green);}
.r-move.down{color:var(--red);}
.r-move.flat{color:#ccc;}
.result-entry.has-judges{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.result-entry.has-judges:hover{background:#f9f9f9;}
.result-entry.has-judges:active{background:#f0f0f0;}
.r-judge-hint{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#aaa;border:1px solid #e0e0e0;border-radius:3px;padding:3px 7px;margin-top:6px;background:#fafafa;white-space:nowrap;float:right;clear:right;}
.r-judge-hint::before{content:'▸';font-size:9px;}
.result-entry.open .r-judge-hint{color:var(--red);border-color:#ffd0d0;background:#fff8f8;}
.result-entry.open .r-judge-hint::before{content:'▾';}
.derby-expand{display:none;padding:8px 16px 12px;border-top:1px solid var(--border);background:#fcfcfc;justify-content:flex-end;}
.result-entry.open .derby-expand{display:flex;}
.de-inner{display:flex;flex-direction:column;align-items:flex-end;}
.de-section{margin-bottom:8px;text-align:right;}
.de-section:last-child{margin-bottom:0;}
.de-section-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:3px;text-align:right;}
.de-judge-row{display:flex;align-items:baseline;gap:8px;padding:2px 0;justify-content:flex-end;}
.de-judge-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:#999;}
.de-judge-math{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-body);text-align:right;}
.de-judge-rank{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);min-width:34px;text-align:right;}
.de-judge-rank.solo-winner{color:var(--green);font-weight:700;}
.de-judge-card-row{display:flex;align-items:baseline;gap:8px;padding:2px 0;justify-content:flex-end;}
.de-judge-card-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:#999;}
.de-judge-card-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--text-body);}
.de-judge-card-rank{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);min-width:86px;text-align:right;}
.de-judge-card-rank.would-win{color:var(--green);font-weight:700;}

/* Judge Summary header */
.jt-summary{background:#fff8f8;border:1px solid #ffd0d0;border-radius:3px;margin:12px 16px 0;padding:10px 14px;}
.jt-summary-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.jt-summary-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);font-weight:600;}
.jt-summary-sub{font-family:'DM Mono',monospace;font-size:9px;color:#aaa;letter-spacing:.04em;}
.jt-judge-block{margin-bottom:8px;}
.jt-judge-block:last-child{margin-bottom:0;}
.jt-judge-block-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:3px;}
.jt-judge-row{display:flex;align-items:baseline;gap:8px;padding:2px 0;}
.jt-judge-rank{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;min-width:18px;}
.jt-judge-horse{font-size:13px;font-weight:600;color:var(--black);flex:1;}
.jt-judge-score{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);}
.jt-judge-row.differs .jt-judge-horse{color:var(--red);}

/* STATES */
.state-box{text-align:center;padding:60px 20px;}
.spinner{width:28px;height:28px;border:3px solid #e8e8e8;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-lbl{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}

/* FOOTER */
footer{background:var(--black);padding:24px 16px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;color:#666;}
footer a{color:#888;text-decoration:none;}
footer a:hover{color:var(--red);}

@media(min-width:768px){
  .header-inner{height:70px;padding:0 clamp(16px,4vw,48px);}
  .title-bar{padding:18px clamp(16px,4vw,48px) 14px;}
  .title-main{font-size:26px;}
  .on-course-wrap{padding:14px clamp(16px,4vw,48px);}
  .result-main{padding:13px clamp(16px,4vw,48px);}
  .breadcrumbs{padding:0 clamp(16px,4vw,48px);}
  footer{padding:26px clamp(16px,4vw,48px);}
}
</style>
<script src="display-config.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" id="backBtn" href="classes.html">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Classes
    </a>
    <a class="logo-tap" href="index.html">
      <img class="logo-img" src="assets/logo.png" alt="WEST">
      <span class="logo-west">WEST</span><span class="logo-sep">|</span><span class="logo-scoring">Scoring.Live</span>
    </a>
  </div>
</header>

<nav class="breadcrumbs">
  <a class="bc-home" href="index.html">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="1" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="7" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="7" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/></svg>
    All Shows
  </a>
  <span class="bc-sep">&rsaquo;</span>
  <a class="bc-link" id="bcShow" href="#">Show</a>
  <span class="bc-sep">&rsaquo;</span>
  <span class="bc-current" id="bcClass">Class</span>
</nav>

<div id="titleArea"></div>
<div id="liveBtn"></div>
<div id="content">
  <div class="state-box"><div class="spinner"></div><div class="state-lbl">Loading Results&hellip;</div></div>
</div>

<footer>
  <p>WEST Timing and Scoring &nbsp;&middot;&nbsp; <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> &nbsp;&middot;&nbsp; <a href="admin.html">Admin</a></p>
</footer>

<script>
const WORKER   = 'https://west-worker.bill-acb.workers.dev';
const params   = new URLSearchParams(location.search);
const SLUG     = params.get('slug') || 'hits-culpeper';
const CLASS_NUM = params.get('classNum') || '';
const RING     = params.get('ring') || '1';
const SHOW_NAME = decodeURIComponent(params.get('name') || SLUG);

// Back link
const classesUrl = 'classes.html?slug=' + encodeURIComponent(SLUG) + '&ring=' + RING + '&name=' + encodeURIComponent(SHOW_NAME);
document.getElementById('backBtn').href = classesUrl;
document.getElementById('bcShow').href = classesUrl;
document.getElementById('bcShow').textContent = SHOW_NAME;
document.getElementById('bcClass').textContent = 'Class ' + CLASS_NUM;

let classInfo = null;
let entries   = [];
let liveData  = {};

var esc = WEST.esc;

// FEI flags and cls header parser now in display-config.js;

var parseClsHeader = WEST.parseClsHeader;
function countryFlag(code) { return WEST.countryFlag(code, classInfo && classInfo.show_flags); }

function fmtTime(val) {
  return WEST.formatTime(val, classInfo ? classInfo.clock_precision : 2);
}

let _judgeView = false;
function toggleJudgeView() {
  _judgeView = !_judgeView;
  renderTitle();
  renderResults();
}

function renderTitle() {
  if (!classInfo) return;
  const isJumper = classInfo.class_type === 'J' || classInfo.class_type === 'T';
  const isHunter = classInfo.class_type === 'H';
  const type = WEST.getClassTypeLabel(classInfo);
  const sel = liveData.selected;
  const isLive = sel && String(sel.classNum) === String(CLASS_NUM);
  const liveBadge = isLive ? ' <span class="live-pill"><span class="live-blink"></span>Live</span>' : '';
  const statsBtn = isJumper
    ? '<a class="stats-btn visible" href="stats.html?slug=' + esc(SLUG) + '&classNum=' + esc(CLASS_NUM) + '&ring=' + esc(RING) + '&name=' + encodeURIComponent(SHOW_NAME) + '">Stats &amp; Analysis</a>'
    : '';

  // View Judges Scores toggle — multi-judge hunter classes (derbies + scored non-derby)
  let judgesBtn = '';
  let splitPill = '';
  const _c = classInfo._computed;
  const hasPerJudge = WEST.hunter.isDerby(classInfo) || (_c && _c.entries && _c.entries.length && _c.entries[0].r1Ranks);
  if (isHunter && hasPerJudge) {
    const c = _c;
    const judgeCount = c ? (c.judgeCount || 1) : WEST.hunter.derby.getJudgeCount(classInfo);
    if (judgeCount >= 2) {
      const btnLabel = _judgeView ? 'View Combined' : 'View Judges Scores';
      judgesBtn = '<button class="judges-btn' + (_judgeView ? ' active' : '') + '" onclick="toggleJudgeView()">' + btnLabel + '</button>';
      if (c ? c.isSplitDecision : false) {
        splitPill = '<span class="split-pill">Split Decision</span>';
      } else if (!c) {
        const built = WEST.hunter.derby.buildEntries(classInfo);
        if (WEST.hunter.derby.shouldShowJudgeSummary(built.entries, built.judgeCount)) {
          splitPill = '<span class="split-pill">Split Decision</span>';
        }
      }
    }
  }

  document.title = 'Class ' + CLASS_NUM + ' — ' + SHOW_NAME + ' — WEST Scoring Live';

  document.getElementById('titleArea').innerHTML =
    '<div class="title-bar">'
    + '<div class="title-classnum">Class ' + esc(CLASS_NUM) + '</div>'
    + '<div class="title-main">' + esc(classInfo.class_name) + liveBadge + '</div>'
    + '<div class="title-meta"><span class="title-type">' + esc(type) + '</span></div>'
    + (classInfo.sponsor ? '<div class="title-sponsor">' + esc(classInfo.sponsor) + '</div>' : '')
    + statsBtn
    + judgesBtn
    + splitPill
    + '</div>';
}

function renderLiveBtn() {
  const area = document.getElementById('liveBtn');
  const sel = liveData.selected;
  if (!sel || String(sel.classNum) !== String(CLASS_NUM) || !liveData.watcherAlive) { area.innerHTML = ''; return; }
  const liveUrl = 'live.html?slug=' + encodeURIComponent(SLUG) + '&ring=' + RING + '&name=' + encodeURIComponent(SHOW_NAME);
  area.innerHTML = '<a class="live-banner" href="' + esc(liveUrl) + '">'
    + '<div class="live-blink"></div>'
    + '<div class="live-banner-text">Watch Live &mdash; On Course &amp; Standings</div>'
    + '<div class="live-banner-arrow">&rsaquo;</div>'
    + '</a>';
}

let _openEntryNum = null;
function toggleEntry(el, ev) {
  if (ev) ev.stopPropagation();
  const num = el.getAttribute('data-entry-num');
  if (_openEntryNum === num) {
    el.classList.remove('open');
    _openEntryNum = null;
  } else {
    document.querySelectorAll('.result-entry.open').forEach(n => n.classList.remove('open'));
    el.classList.add('open');
    _openEntryNum = num;
  }
}
function restoreOpenEntry() {
  if (!_openEntryNum) return;
  const el = document.querySelector('.result-entry[data-entry-num="' + _openEntryNum + '"]');
  if (el && el.classList.contains('has-judges')) el.classList.add('open');
  else _openEntryNum = null;
}

function renderDerby() {
  const sel = liveData.selected;
  const isLive = !!(sel && String(sel.classNum) === String(CLASS_NUM));
  const opts = { isLive: isLive };

  // If server pre-computed results are available, use renderPrecomputed path.
  // Otherwise fall back to display-config.js buildEntries (parses cls_raw client-side).
  const c = classInfo._computed;
  let html;
  if (c && c.entries && c.entries.length && c.entries[0].r1Ranks) {
    html = _judgeView
      ? WEST.hunter.derby.renderPrecomputedByJudge(c, opts)
      : WEST.hunter.derby.renderPrecomputed(c, opts);
  } else {
    html = _judgeView
      ? WEST.hunter.derby.renderByJudgeList(classInfo, opts)
      : WEST.hunter.derby.renderList(classInfo, opts);
  }
  document.getElementById('content').innerHTML = html;
  if (!_judgeView) restoreOpenEntry();
}

function renderResults() {
  if (!classInfo) return;
  const ct = classInfo.class_type || (classInfo._computed ? classInfo._computed.classType : '');
  const isJumper = ct === 'J' || ct === 'T';
  const isHunter = ct === 'H';

  // Hunter derby OR non-derby scored with per-judge data → dedicated render path
  if (isHunter && WEST.hunter.isDerby(classInfo)) {
    renderDerby();
    return;
  }
  // Non-derby scored hunter with pre-computed per-judge rankings
  const c = classInfo._computed;
  if (isHunter && c && c.entries && c.entries.length && c.entries[0].r1Ranks) {
    renderDerby(); // same renderer — pre-computed data has identical shape
    return;
  }

  // Group entries by entry_num, merge rounds.
  // Pre-computed entries (from Worker) have round data at top level (r1TotalFaults etc.)
  // Legacy D1 entries have round sub-objects from the JOIN.
  const isPrecomputed = !!(classInfo._computed);
  const byEntry = {};

  if (isPrecomputed && isJumper) {
    // Pre-computed jumper: entries already have all round data inline
    entries.forEach(e => {
      const rounds = [];
      if (e.r1TotalTime) rounds.push({ round: 1, time: e.r1TotalTime, total: e.r1TotalFaults, jump_faults: e.r1JumpFaults, time_faults: e.r1TimeFaults, place: e.place });
      if (e.r2TotalTime) rounds.push({ round: 2, time: e.r2TotalTime, total: e.r2TotalFaults, jump_faults: e.r2JumpFaults, time_faults: e.r2TimeFaults, place: e.place });
      if (e.r3TotalTime) rounds.push({ round: 3, time: e.r3TotalTime, total: e.r3TotalFaults, jump_faults: e.r3JumpFaults, time_faults: e.r3TimeFaults, place: e.place });
      byEntry[e.entry_num] = {
        entry_num: e.entry_num, horse: e.horse, rider: e.rider, owner: e.owner,
        country: e.country, sire: e.sire, dam: e.dam, city: e.city, state: e.state,
        rounds: rounds, bestPlace: parseInt(e.place) || null
      };
    });
  } else if (isPrecomputed && isHunter) {
    // Pre-computed non-derby hunter: entries have place, score, combined at top level
    entries.forEach(e => {
      const rounds = [];
      if (e.r1Total || e.score) rounds.push({ round: 1, total: e.r1Total || e.score, place: e.place });
      if (e.r2Total) rounds.push({ round: 2, total: e.r2Total, place: e.place });
      byEntry[e.entry_num] = {
        entry_num: e.entry_num, horse: e.horse, rider: e.rider, owner: e.owner,
        country: e.country, sire: e.sire, dam: e.dam, city: e.city, state: e.state,
        rounds: rounds, bestPlace: parseInt(e.place) || null
      };
    });
  } else {
    // Legacy D1 entries: round sub-objects from JOIN
    entries.forEach(e => {
      if (!byEntry[e.entry_num]) {
        byEntry[e.entry_num] = { entry_num: e.entry_num, horse: e.horse, rider: e.rider, owner: e.owner,
          country: e.country, sire: e.sire, dam: e.dam, city: e.city, state: e.state,
          horse_fei: e.horse_fei, rider_fei: e.rider_fei,
          rounds: [], bestPlace: null };
      }
      if (e.round) {
        byEntry[e.entry_num].rounds.push(e);
        const p = parseInt(e.place);
        if (p && (!byEntry[e.entry_num].bestPlace || p < byEntry[e.entry_num].bestPlace)) {
          byEntry[e.entry_num].bestPlace = p;
        }
      }
    });
  }

  // Display config lookups — pre-computed path has these directly
  // (c already declared above for the per-judge routing check)
  const sm = c ? (c.scoringMethod || '') : (classInfo.scoring_method || '');
  const method = WEST.jumper.getMethod(sm);
  const isOptimum = c ? !!c.isOptimum : method.isOptimum;
  let optimumTime = 0;
  if (c && c.optimumTime) {
    optimumTime = c.optimumTime;
  } else if (isOptimum && classInfo.cls_raw) {
    const ta = WEST.jumper.getTAFromRaw(classInfo.cls_raw);
    optimumTime = WEST.jumper.getOptimumTime(ta.r1);
  }
  function roundLabel(r) { return WEST.jumper.roundLabel(sm, r); }

  const grouped = Object.values(byEntry);
  // Sort: entries with results first (by best place), then no-result entries
  grouped.sort((a, b) => {
    if (a.bestPlace && b.bestPlace) return a.bestPlace - b.bestPlace;
    if (a.bestPlace) return -1;
    if (b.bestPlace) return 1;
    return 0;
  });

  if (!grouped.length) {
    document.getElementById('content').innerHTML = '<div class="no-results">No entries found for this class.</div>';
    return;
  }

  let html = '<div class="results-wrap">';
  const isHunterEq = isHunter && WEST.hunter.isEquitation(classInfo);
  const sel = liveData.selected;
  const isLive = !!(sel && String(sel.classNum) === String(CLASS_NUM));

  grouped.forEach(g => {
    const place = g.bestPlace || '';
    const hasResult = g.rounds.length > 0;

    // Skip entries with no results and no place — they're pending, not competed
    if (!hasResult && !place) return;

    html += '<div class="result-entry"><div class="result-main">';

    // Placement — SVG ribbon when class is not live, numeric when live
    const ribbonSvg = (!isLive && place) ? WEST.ribbon.placeRibbon(place, classInfo.class_name) : '';
    if (ribbonSvg) {
      html += '<div class="r-ribbon">' + ribbonSvg + '</div>';
    } else {
      html += '<div class="r-ribbon"><div class="r-place-txt">' + (place || '&mdash;') + '</div></div>';
    }

    const flag = classInfo.show_flags ? countryFlag(g.country) : '';

    if (isHunterEq) {
      // Equitation — rider primary, city/state next to rider, horse muted below
      const locale = [g.city, g.state].filter(Boolean).join(', ');
      html += '<div class="r-info">'
        + '<div class="r-horse-rider">'
        + '<span class="r-bib">' + esc(g.entry_num) + '</span>'
        + '<span class="r-horse">' + esc(g.rider) + (flag ? ' ' + flag : '') + '</span>'
        + (locale ? '<span class="r-rider-inline">' + esc(locale) + '</span>' : '')
        + '</div>'
        + (g.horse ? '<div class="r-owner">' + esc(g.horse) + '</div>' : '')
        + '</div>';
    } else {
      const breeding = [g.sire, g.dam].filter(Boolean).join(' x ');
      html += '<div class="r-info">'
        + '<div class="r-horse-rider">'
        + '<span class="r-bib">' + esc(g.entry_num) + '</span>'
        + '<span class="r-horse">' + esc(g.horse) + '</span>'
        + '<span class="r-rider-inline">' + esc(g.rider) + (flag ? ' ' + flag : '') + '</span>'
        + '</div>'
        + (breeding ? '<div class="r-breeding">' + esc(breeding) + '</div>' : '')
        + (g.owner && g.owner !== g.rider ? '<div class="r-owner">' + esc(g.owner) + '</div>' : '')
        + '</div>';
    }

    // Scores
    if (hasResult && isJumper) {
      html += '<div class="r-scores">';
      g.rounds.sort((a, b) => b.round - a.round);
      g.rounds.forEach(r => {
        const lbl = roundLabel(r.round);
        const total = parseFloat(r.total) || 0;
        const isClean = total === 0;
        html += '<div class="r-score-row"><span class="r-score-lbl">' + lbl + '</span>'
          + '<span class="r-score-val' + (isClean ? ' clean' : '') + '">' + (isClean ? '0' : total) + ' flt</span>'
          + (r.time ? '<span class="r-score-val">' + fmtTime(r.time) + '</span>' : '')
          + '</div>';
        // Optimum time distance for IV.1 classes
        if (isOptimum && optimumTime > 0 && r.time && r.round === 1) {
          const t = parseFloat(r.time);
          if (!isNaN(t)) {
            const dist = t - optimumTime;
            const sign = dist >= 0 ? '+' : '';
            html += '<div class="r-score-row"><span class="r-score-lbl">OPT</span>'
              + '<span class="r-score-val" style="font-size:11px;color:' + (Math.abs(dist) < 1 ? 'var(--green)' : 'var(--text-muted)') + ';">'
              + sign + dist.toFixed(3) + 's</span></div>';
          }
        }
      });
      html += '</div>';
    } else if (hasResult && isHunter) {
      html += '<div class="r-scores">';
      g.rounds.forEach(r => {
        if (r.total) {
          html += '<div class="r-score-row"><span class="r-score-val primary">' + esc(r.total) + '</span></div>';
        }
        if (r.time && r.time !== r.total) {
          html += '<div class="r-score-row"><span class="r-score-lbl">Score</span><span class="r-score-val">' + fmtTime(r.time) + '</span></div>';
        }
      });
      html += '</div>';
    } else if (!hasResult) {
      // Entry has a place but no round data (e.g. forced placement)
      // Show place only, no score
    }

    html += '</div></div>';
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

async function loadResults() {
  try {
    const r = await fetch(WORKER + '/getResults?slug=' + encodeURIComponent(SLUG) + '&classNum=' + encodeURIComponent(CLASS_NUM) + '&ring=' + RING);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.ok) {
      if (d.computed) {
        // Pre-computed results from Worker — entries already ranked, no cls_raw needed.
        // Map the computed shape onto classInfo so existing render functions work.
        const c = d.computed;
        classInfo = {
          class_type: c.classType, class_name: c.className, class_num: c.classNum,
          cls_raw: '', // not needed — computation done server-side
          scoring_method: c.scoringMethod || c.classMode || '',
          clock_precision: c.clockPrecision, show_flags: c.showFlags,
          sponsor: c.sponsor, trophy: c.trophy,
          // Pass through pre-computed flags so display-config can skip parsing
          _computed: c,
        };
        entries = d.computed.entries || [];
      } else {
        // Legacy D1 fallback — old shape
        classInfo = d.class;
        entries = d.entries || [];
      }
    }
  } catch(e) {}
}

async function pollLive() {
  try {
    const r = await fetch(WORKER + '/getLiveClass?slug=' + encodeURIComponent(SLUG) + '&ring=' + RING);
    if (r.ok) liveData = await r.json();
  } catch(e) {}
}

async function loadAll() {
  await Promise.all([loadResults(), pollLive()]);
  renderTitle();
  renderLiveBtn();
  renderResults();
}

loadAll();
// Poll live data every 3s, full results every 5s
setInterval(async () => { await pollLive(); renderTitle(); renderLiveBtn(); }, 3000);
setInterval(async () => { await loadResults(); renderResults(); }, 5000);
</script>
