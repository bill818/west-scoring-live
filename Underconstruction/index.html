<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction — WEST Scoring Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #111111;
  --red: #b82025;
  --off-white: #f5f5f5;
  --text-muted: #777;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--off-white);
  color: #333;
  font-family: 'Source Sans 3', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: var(--black);
  border-bottom: 3px solid var(--red);
  padding: 16px;
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.logo-west {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 28px;
  color: #fff;
}
.logo-sep {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  color: var(--red);
  margin: 0 4px;
}
.logo-scoring {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  color: var(--red);
  letter-spacing: .04em;
}
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.card {
  max-width: 540px;
  text-align: center;
  background: #fff;
  border: 1px solid #e2e2e2;
  border-radius: 8px;
  padding: 48px 32px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}
.tag {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #fff;
  background: var(--red);
  padding: 6px 14px;
  border-radius: 2px;
  margin-bottom: 24px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.2;
  margin-bottom: 16px;
}
p {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 12px;
}
p.meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .1em;
  color: #aaa;
  text-transform: uppercase;
  margin-top: 28px;
}
footer {
  background: var(--black);
  padding: 20px 16px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #666;
}
footer a { color: #888; text-decoration: none; }
footer a:hover { color: var(--red); }
@media (min-width: 768px) {
  h1 { font-size: 48px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo-west">WEST</span>
    <span class="logo-sep">|</span>
    <span class="logo-scoring">Scoring.Live</span>
  </div>
</header>

<main>
  <div class="card">
    <div class="tag">Under Construction</div>
    <h1>We&rsquo;re Rebuilding</h1>
    <p>WEST Scoring Live is getting a major upgrade for the 2026 show season.</p>
    <p>Live results will return shortly — thank you for your patience.</p>
    <p class="meta">WEST Timing &amp; Scoring</p>
  </div>
</main>

<footer>
  <p>WEST Timing and Scoring &nbsp;&middot;&nbsp; <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a></p>
</footer>

</body>
</html>
