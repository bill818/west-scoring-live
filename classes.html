<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WEST Scoring Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #111111;
  --red: #b82025;
  --white: #ffffff;
  --off-white: #f5f5f5;
  --border: #e2e2e2;
  --text-muted: #777;
  --text-body: #333;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--off-white);color:var(--text-body);font-family:'Source Sans 3',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--black);border-bottom:3px solid var(--red);}
.header-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:56px;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;color:#fff;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;text-decoration:none;min-width:44px;min-height:44px;padding:0;background:none;border:none;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.back-btn:hover{color:var(--red);}
.logo-tap{display:flex;align-items:center;gap:8px;text-decoration:none;margin-left:auto;}
.logo-img{height:26px;width:auto;filter:invert(1);}
.logo-west{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:#fff;}
.logo-sep{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);margin:0 3px;}
.logo-scoring{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);letter-spacing:.04em;}
@media(max-width:480px){.logo-west,.logo-sep,.logo-scoring{display:none;}}

/* BREADCRUMBS */
.breadcrumbs{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:0;min-height:40px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.breadcrumbs::-webkit-scrollbar{display:none;}
.bc-home{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--red);text-decoration:none;padding:10px 10px 10px 0;white-space:nowrap;flex-shrink:0;}
.bc-home:hover{color:var(--black);}
.bc-sep{font-family:'DM Mono',monospace;font-size:11px;color:#ccc;padding:0 6px;flex-shrink:0;user-select:none;}
.bc-link{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--red);text-decoration:none;padding:10px 0;white-space:nowrap;flex-shrink:0;}
.bc-link:hover{border-bottom:1px solid var(--red);}
.bc-current{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--text-muted);padding:10px 0;white-space:nowrap;flex-shrink:0;}

/* TITLE BAR */
.title-bar{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px 12px;}
.title-main{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--black);line-height:1.2;}
.title-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:10px;}
.watcher-chip{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:5px;}
.watcher-dot{width:6px;height:6px;border-radius:50%;background:#555;}
.watcher-dot.alive{background:#2e7d32;animation:blink 1.6s ease-in-out infinite;}

/* SORT BAR */
.sort-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:6px;}
.sort-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-right:4px;}
.sort-btn{background:none;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--text-muted);padding:5px 10px;cursor:pointer;transition:all .12s;}
.sort-btn:hover{border-color:#999;color:var(--text-body);}
.sort-btn.active{background:var(--black);color:#fff;border-color:var(--black);}

/* LIVE BUTTON */
.live-banner{display:flex;align-items:center;gap:10px;background:#fff;border-bottom:3px solid var(--red);padding:12px 16px;text-decoration:none;color:inherit;transition:background .1s;cursor:pointer;}
.live-banner:hover{background:#fff8f8;}
.live-blink{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1.6s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.live-banner-text{flex:1;}
.live-banner-class{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);font-weight:600;}
.live-banner-name{font-size:14px;font-weight:600;color:var(--black);margin-top:1px;}
.live-banner-arrow{font-size:18px;color:var(--red);flex-shrink:0;font-weight:700;}

/* DAY SECTIONS */
.day-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);padding:12px 16px 6px;background:var(--off-white);border-bottom:1px solid var(--border);border-top:1px solid var(--border);}

/* CLASS ROWS */
.class-row{display:flex;align-items:center;gap:10px;padding:0 16px;min-height:56px;background:#fff;border-bottom:1px solid var(--border);cursor:pointer;text-decoration:none;color:inherit;transition:background .1s;}
.class-row:active,.class-row:hover{background:var(--off-white);}
.class-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);min-width:54px;flex-shrink:0;}
.class-info{flex:1;min-width:0;}
.class-name{font-size:15px;color:var(--text-body);line-height:1.3;}
.class-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px;}
.class-arrow{font-size:16px;color:#ccc;flex-shrink:0;}
.live-dot-inline{display:inline-block;width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:7px;flex-shrink:0;animation:blink 1.6s ease-in-out infinite;vertical-align:middle;}
.badge-complete{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;background:#f5f5f5;color:#757575;padding:2px 6px;border-radius:2px;margin-left:7px;vertical-align:middle;}
.badge-champ{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:2px;margin-left:7px;vertical-align:middle;}
.badge-jo{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;background:#e3f2fd;color:#1565c0;padding:2px 6px;border-radius:2px;margin-left:7px;vertical-align:middle;}

/* STATES */
.state-box{text-align:center;padding:60px 20px;}
.spinner{width:28px;height:28px;border:3px solid #e8e8e8;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-lbl{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}

.content-wrap{padding-bottom:60px;}
.class-search-wrap{padding:8px 16px;background:#fff;border-bottom:1px solid var(--border);position:relative;}
.class-search{width:100%;padding:8px 12px 8px 34px;font-family:'Source Sans 3',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:6px;background:#fff;outline:none;transition:border-color .15s;}
.class-search:focus{border-color:var(--red);}
.class-search::placeholder{color:#bbb;}
.class-search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none;}
.class-search-clear{position:absolute;right:26px;top:50%;transform:translateY(-50%);background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;display:none;}
.class-search-clear.visible{display:block;}
@media(min-width:768px){.class-search-wrap{padding:8px clamp(16px,4vw,48px);}}

/* FOOTER */
footer{background:var(--black);padding:24px 16px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;color:#666;}
footer a{color:#888;text-decoration:none;}
footer a:hover{color:var(--red);}

@media(min-width:768px){
  .header-inner{height:70px;padding:0 clamp(16px,4vw,48px);}
  .title-bar{padding:18px clamp(16px,4vw,48px) 14px;}
  .title-main{font-size:26px;}
  .sort-bar{padding:8px clamp(16px,4vw,48px);}
  .on-course-wrap{padding:14px clamp(16px,4vw,48px);}
  .day-label{padding:12px clamp(16px,4vw,48px) 6px;}
  .class-row{padding:0 clamp(16px,4vw,48px);min-height:60px;}
  .class-name{font-size:16px;}
  .breadcrumbs{padding:0 clamp(16px,4vw,48px);}
  footer{padding:26px clamp(16px,4vw,48px);}
}
</style>
<script src="display-config.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" id="backBtn" href="index.html">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="backLabel">Show</span>
    </a>
    <a class="logo-tap" href="index.html">
      <img class="logo-img" src="assets/logo.png" alt="WEST">
      <span class="logo-west">WEST</span><span class="logo-sep">|</span><span class="logo-scoring">Scoring.Live</span>
    </a>
  </div>
</header>

<nav class="breadcrumbs">
  <a class="bc-home" href="index.html">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="1" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="7" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="7" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/></svg>
    All Shows
  </a>
  <span class="bc-sep">&rsaquo;</span>
  <a class="bc-link" id="bcShow" href="#">Show</a>
  <span class="bc-sep">&rsaquo;</span>
  <span class="bc-current" id="bcRing">Classes</span>
</nav>

<div id="titleArea"></div>
<div id="liveBtn"></div>
<div class="class-search-wrap">
  <span class="class-search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
  <input class="class-search" id="classSearch" type="text" placeholder="Search classes..." autocomplete="off">
  <button class="class-search-clear" id="classSearchClear" type="button">&times;</button>
</div>
<div id="sortArea"></div>
<div id="content">
  <div class="state-box"><div class="spinner"></div><div class="state-lbl">Loading Classes&hellip;</div></div>
</div>

<footer>
  <p>WEST Timing and Scoring &nbsp;&middot;&nbsp; <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> &nbsp;&middot;&nbsp; <a href="admin.html">Admin</a></p>
</footer>

<script>
const WORKER = 'https://west-worker.bill-acb.workers.dev';
const params  = new URLSearchParams(location.search);
const SLUG    = params.get('slug') || 'hits-culpeper';
const RING    = params.get('ring') || '1';
const SHOW_NAME = decodeURIComponent(params.get('name') || SLUG);

const showUrl = 'show.html?slug=' + encodeURIComponent(SLUG);
document.getElementById('backBtn').href = showUrl;
document.getElementById('backLabel').textContent = SHOW_NAME;
document.getElementById('bcShow').href = showUrl;
document.getElementById('bcShow').textContent = SHOW_NAME;
let ringName = 'Ring ' + RING;
document.getElementById('bcRing').textContent = ringName;
document.title = SHOW_NAME + ' — ' + ringName + ' — WEST Scoring Live';

// Fetch ring name from /getShow and update breadcrumb + title
fetch(WORKER + '/getShow?slug=' + encodeURIComponent(SLUG))
  .then(r => r.json()).then(d => {
    if (d.ok && d.rings) {
      var ring = d.rings.find(r => String(r.ring_num) === String(RING));
      if (ring && ring.ring_name) {
        ringName = ring.ring_name;
        document.getElementById('bcRing').textContent = ringName;
        document.title = SHOW_NAME + ' — ' + ringName + ' — WEST Scoring Live';
      }
    }
  }).catch(function() {});

let allClasses = [];
let liveData   = {};
let sortMode   = 'day'; // day | name | number

var esc = WEST.esc;

function typeLabel(t) {
  if (t === 'J' || t === 'T') return 'Jumper';
  if (t === 'H') return 'Hunter';
  return t || '';
}

function fmtDay(iso) {
  if (!iso) return 'Unscheduled';
  try {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  } catch(e) { return iso; }
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === mode));
  renderClasses();
}

function renderTitle() {
  const classCount = allClasses.length + ' class' + (allClasses.length !== 1 ? 'es' : '');
  document.getElementById('titleArea').innerHTML =
    '<div class="title-bar">'
    + '<div class="title-main">' + esc(SHOW_NAME) + '</div>'
    + '<div class="title-sub"><span>' + classCount + '</span></div>'
    + '</div>';
}

function renderSortBar() {
  document.getElementById('sortArea').innerHTML =
    '<div class="sort-bar">'
    + '<span class="sort-lbl">Sort</span>'
    + '<button class="sort-btn' + (sortMode === 'day' ? ' active' : '') + '" data-sort="day" onclick="setSort(\'day\')">By Day</button>'
    + '<button class="sort-btn' + (sortMode === 'name' ? ' active' : '') + '" data-sort="name" onclick="setSort(\'name\')">By Name</button>'
    + '<button class="sort-btn' + (sortMode === 'number' ? ' active' : '') + '" data-sort="number" onclick="setSort(\'number\')">By Number</button>'
    + '</div>';
}

function renderLiveBtn() {
  const area = document.getElementById('liveBtn');
  const active = liveData.activeClasses || [];
  if (!active.length || !liveData.watcherAlive) { area.innerHTML = ''; return; }
  const liveUrl = 'live.html?slug=' + encodeURIComponent(SLUG) + '&ring=' + RING + '&name=' + encodeURIComponent(SHOW_NAME);
  const label = active.length === 1
    ? 'Live Now &mdash; Class ' + esc(active[0].classNum)
    : 'Live Now &mdash; ' + active.length + ' classes in the ring';
  const name = active.length === 1
    ? esc(active[0].className || '')
    : active.map(a => esc(a.classNum)).join(', ');
  area.innerHTML = '<a class="live-banner" href="' + esc(liveUrl) + '">'
    + '<div class="live-blink"></div>'
    + '<div class="live-banner-text">'
    + '<div class="live-banner-class">' + label + '</div>'
    + '<div class="live-banner-name">' + name + '</div>'
    + '</div>'
    + '<div class="live-banner-arrow">&rsaquo;</div>'
    + '</a>';
}

function renderClasses() {
  if (!allClasses.length) {
    document.getElementById('content').innerHTML = '<div class="state-box"><div class="state-lbl">No classes found for this show.</div></div>';
    return;
  }
  // Filter: hide unscheduled and zero-entry classes
  const searchQ = (document.getElementById('classSearch') ? document.getElementById('classSearch').value : '').trim().toLowerCase();
  // tsked.csv is the bible — if a class is on the schedule (has a
  // scheduled_date), show it even before entries are imported.
  // Admin "Hidden" toggle removes a class from the by-day view without
  // deleting its data (stays in worker/D1 for historical purposes).
  const visible = allClasses.filter(c => {
    if (!c.scheduled_date) return false;
    if (c.hidden) return false;
    if (searchQ && !(
      (c.class_name || '').toLowerCase().includes(searchQ) ||
      (c.class_num || '').toLowerCase().includes(searchQ)
    )) return false;
    return true;
  });
  if (!visible.length) {
    document.getElementById('content').innerHTML = '<div class="state-box"><div class="state-lbl">No scheduled classes with entries yet.</div></div>';
    return;
  }
  const activeNums = (liveData.activeClasses || []).map(a => String(a.classNum));

  // Sort
  let sorted;
  if (sortMode === 'name') {
    sorted = [...visible].sort((a, b) => (a.class_name || '').localeCompare(b.class_name || ''));
  } else if (sortMode === 'number') {
    sorted = [...visible].sort((a, b) => {
      const an = parseInt(a.class_num) || 0, bn = parseInt(b.class_num) || 0;
      if (an !== bn) return an - bn;
      return (a.class_num || '').localeCompare(b.class_num || '');
    });
  } else {
    // By day — API sorted by date ASC, but we want most recent day first
    sorted = [...visible];
  }

  let html = '<div class="content-wrap">';

  if (sortMode === 'day') {
    // Group by date, most recent day first
    const groups = [];
    let curDate = null, curGroup = null;
    sorted.forEach(c => {
      const d = c.scheduled_date || '';
      if (d !== curDate) {
        curDate = d;
        curGroup = { date: d, label: fmtDay(d), classes: [] };
        groups.push(curGroup);
      }
      curGroup.classes.push(c);
    });
    // Reverse so most recent day is on top
    groups.reverse();

    groups.forEach(g => {
      html += '<div class="day-label">' + esc(g.label) + '</div>';
      g.classes.forEach(c => { html += buildClassRow(c, activeNums); });
    });
  } else {
    sorted.forEach(c => { html += buildClassRow(c, activeNums); });
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function buildClassRow(c, activeNums) {
  const isLive = activeNums.includes(String(c.class_num));
  const isComplete = c.status === 'complete';
  const type = typeLabel(c.class_type);
  const entryInfo = c.entry_count > 0 ? c.entry_count + ' entries' : '';
  const meta = [type, entryInfo].filter(Boolean).join(' &middot; ');
  const dot = isLive ? '<span class="live-dot-inline"></span>' : '';
  const completeBadge = isComplete ? '<span class="badge-complete">Complete</span>' : '';
  const scoredBadge = ''; // Removed — "Scored" label not needed on class list
  const joBadge = c.schedule_flag === 'JO' && !isComplete ? '<span class="badge-jo">Order of Go Posted</span>' : '';

  return '<a class="class-row" href="results.html?slug=' + esc(SLUG) + '&classNum=' + esc(c.class_num) + '&ring=' + esc(RING) + '&name=' + encodeURIComponent(SHOW_NAME) + '">'
    + '<span class="class-num">' + esc(c.class_num) + '</span>'
    + '<div class="class-info"><div class="class-name">' + esc(c.class_name) + dot + completeBadge + scoredBadge + joBadge + '</div>'
    + (meta ? '<div class="class-meta">' + meta + '</div>' : '')
    + '</div><span class="class-arrow">&rsaquo;</span></a>';
}

async function loadClasses() {
  try {
    const r = await fetch(WORKER + '/getClasses?slug=' + encodeURIComponent(SLUG) + '&ring=' + RING);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.ok) allClasses = d.classes || [];
  } catch(e) {}
}

async function pollLive() {
  try {
    const r = await fetch(WORKER + '/getLiveClass?slug=' + encodeURIComponent(SLUG) + '&ring=' + RING);
    if (r.ok) liveData = await r.json();
  } catch(e) {}
}

async function loadAll() {
  await Promise.all([loadClasses(), pollLive()]);
  renderTitle();
  renderSortBar();
  renderLiveBtn();
  renderClasses();
}

loadAll();
setInterval(async () => { await pollLive(); renderTitle(); renderLiveBtn(); }, 3000);
setInterval(async () => { await loadClasses(); renderClasses(); }, 30000);

// Class search
(function() {
  var input = document.getElementById('classSearch');
  var clearBtn = document.getElementById('classSearchClear');
  var timer = null;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    clearBtn.classList.toggle('visible', input.value.length > 0);
    timer = setTimeout(function() { renderClasses(); }, 200);
  });
  clearBtn.addEventListener('click', function() {
    input.value = '';
    clearBtn.classList.remove('visible');
    renderClasses();
    input.focus();
  });
})();
</script>
</body>
</html>
