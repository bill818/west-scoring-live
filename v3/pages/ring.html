<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST Scoring — Ring</title>
<link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="west.css"><!-- west.css @imports the Google Fonts; do not add a font <link> here -->
</head>
<body>

<header class="app-header">
  <a href="index.html" class="brand">
    <div class="brand-mark"><img src="../../assets/logo.png" alt="WEST"></div>
    <div class="brand-name">WEST</div>
    <span class="brand-tag">SCORING.LIVE</span>
  </a>
  <nav class="app-nav">
    <a href="index.html">Shows</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<nav class="breadcrumbs">
  <a class="bc-link" href="index.html">All shows</a>
  <span class="bc-sep">/</span>
  <a class="bc-link" id="bcShow" href="#">…</a>
  <span class="bc-sep">/</span>
  <span class="bc-current" id="bcRing">…</span>
</nav>

<div id="hero" class="show-hero">
  <div class="spinner" style="grid-column: 1 / 4;"></div>
</div>

<div class="section-banner standalone" id="classesBanner">Classes</div>
<div class="sort-bar" id="sortBar">
  <button class="sort-btn is-active" data-mode="scheduled" data-label="Scheduled">Scheduled</button>
  <button class="sort-btn" data-mode="name" data-label="Class Name">Class Name</button>
  <button class="sort-btn" data-mode="number" data-label="Class Number">Class Number</button>
  <button class="sort-btn" data-mode="unscheduled" data-label="Unscheduled">Unscheduled</button>
</div>
<div id="classes"><div class="spinner"></div></div>

<footer>
  WEST Timing and Scoring · <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> · <a href="admin.html" target="_blank" rel="noopener">Admin</a>
</footer>

<!-- Shared utilities: format helpers + API client. Single source of truth
     for escape, day labels, country flags, AUTH header, worker URL. -->
<script src="../js/west-format.js"></script>
<script src="../js/west-api.js"></script>

<script>
const escapeHtml = WEST.format.escapeHtml;
const fetchJson = WEST.api.fetchJson;
const fmtDayLabel = WEST.format.dayLabelLong;

const state = {
  slug: '',
  ringNum: 1,
  show: null,
  ring: null,
  classes: [],
  viewMode: 'scheduled',
  sortDir: 'asc',
  // Set of class ids currently LIVE on this ring (per the S46 lock
  // model). Updated by the live WS subscription opened in load().
  liveClassIds: new Set(),
};

const getQueryParam = WEST.api.queryParam;

function renderHero() {
  const ring = state.ring;
  const show = state.show;
  const liveCount = state.classes.filter(c => !c.deleted_at).length;
  const ringName = ring.name || `Ring ${ring.ring_num}`;
  const countLabel = liveCount === 1 ? '1 class' : `${liveCount} classes`;

  // Hero anchor: navy ring-number badge in the logo slot. Reuses the
  // .show-hero-logo grid cell with a .ring-badge modifier defined in
  // west.css (no inline styling here).
  document.getElementById('hero').innerHTML = `
    <div class="show-hero-logo ring-badge">
      <div class="num">${ring.ring_num}</div>
      <div class="lbl">RING</div>
    </div>
    <div class="show-hero-text">
      <div class="show-hero-name">${escapeHtml(ringName)}</div>
      <div class="show-hero-meta">${escapeHtml(show.name)}</div>
      <div class="show-hero-loc">${countLabel}</div>
    </div>
    <div class="show-hero-side"></div>`;

  // Banner count update — happens once we know the number of classes.
  const banner = document.getElementById('classesBanner');
  if (banner) banner.innerHTML = `Classes <span class="count">${countLabel}</span>`;

  document.getElementById('bcShow').textContent = show.name;
  document.getElementById('bcShow').href = `show.html?slug=${encodeURIComponent(show.slug)}`;
  document.getElementById('bcRing').textContent = ringName;
  document.title = `${ringName} — ${show.name}`;
}

function ringHeroError(title, sub) {
  // Span the show-hero grid cleanly with a single error block.
  document.getElementById('hero').innerHTML = `
    <div style="grid-column: 1 / -1;">
      <div class="show-hero-name" style="font-size: 28px;">${escapeHtml(title)}</div>
      ${sub ? `<div class="show-hero-loc">${sub}</div>` : ''}
    </div>`;
  document.getElementById('classes').innerHTML = '';
  const banner = document.getElementById('classesBanner');
  if (banner) banner.innerHTML = 'Classes';
}

function classRow(c, dimAsUnscheduled) {
  const url = `class.html?slug=${encodeURIComponent(state.slug)}&ring=${state.ringNum}&class=${encodeURIComponent(c.class_id)}`;
  const meta = [];
  meta.push(`${c.entry_count || 0} ${c.entry_count === 1 ? 'entry' : 'entries'}`);
  if (c.schedule_flag) meta.push(escapeHtml(c.schedule_flag));
  // Live dot — pulses green when this class is currently live per the
  // S46 lock model. liveClassIds is updated by the WS subscription.
  const isLive = state.liveClassIds.has(String(c.class_id));
  const rowClasses = ['cls-row'];
  if (dimAsUnscheduled) rowClasses.push('is-unscheduled');
  if (isLive)           rowClasses.push('is-live');
  const liveDot = isLive ? '<span class="cls-live-dot" aria-label="Live"></span>' : '';
  return `<a class="${rowClasses.join(' ')}" href="${url}" data-class-id="${escapeHtml(String(c.class_id))}">
    <div class="cls-num">${liveDot}${escapeHtml(c.class_id)}</div>
    <div class="cls-body">
      <div class="cls-name">${escapeHtml(c.class_name || '—')}</div>
      <div class="cls-meta">${meta.join('<span style="opacity:.4">·</span>')}</div>
    </div>
    <div class="cls-arrow">›</div>
  </a>`;
}

function partition() {
  const scheduled = [];
  const unscheduled = [];
  for (const c of state.classes) {
    if (c.deleted_at) continue;
    if (c.scheduled_date) scheduled.push(c);
    else unscheduled.push(c);
  }
  return { scheduled, unscheduled };
}

function sortByNumber(arr, dir) {
  const sign = dir === 'desc' ? -1 : 1;
  return [...arr].sort((a, b) =>
    sign * String(a.class_id).localeCompare(String(b.class_id), undefined, { numeric: true })
  );
}

function sortByName(arr, dir) {
  const sign = dir === 'desc' ? -1 : 1;
  return [...arr].sort((a, b) =>
    sign * String(a.class_name || '').localeCompare(String(b.class_name || ''))
  );
}

function renderClasses() {
  const root = document.getElementById('classes');
  const { scheduled, unscheduled } = partition();

  if (state.viewMode === 'scheduled') {
    if (!scheduled.length) {
      root.innerHTML = '<div class="placeholder">No scheduled classes.</div>';
      return;
    }
    const groups = new Map();
    for (const c of scheduled) {
      if (!groups.has(c.scheduled_date)) groups.set(c.scheduled_date, []);
      groups.get(c.scheduled_date).push(c);
    }
    const keys = [...groups.keys()].sort();
    let html = '';
    for (const k of keys) {
      const rows = sortByNumber(groups.get(k), 'asc').map(c => classRow(c, false)).join('');
      html += `<div class="day-section">
        <div class="day-label">${escapeHtml(fmtDayLabel(k))}</div>
        <div class="cls-list">${rows}</div>
      </div>`;
    }
    root.innerHTML = html;
    return;
  }

  if (state.viewMode === 'unscheduled') {
    if (!unscheduled.length) {
      root.innerHTML = '<div class="placeholder">No unscheduled classes.</div>';
      return;
    }
    const rows = sortByNumber(unscheduled, 'asc').map(c => classRow(c, false)).join('');
    root.innerHTML = `<div class="cls-list">${rows}</div>`;
    return;
  }

  // 'name' or 'number' — flat list across all live classes;
  // unscheduled rows render dimmed and italic.
  const all = [...scheduled, ...unscheduled];
  if (!all.length) {
    root.innerHTML = '<div class="placeholder">No classes yet.</div>';
    return;
  }
  const sorted = state.viewMode === 'name'
    ? sortByName(all, state.sortDir)
    : sortByNumber(all, state.sortDir);
  const rows = sorted.map(c => classRow(c, !c.scheduled_date)).join('');
  root.innerHTML = `<div class="cls-list">${rows}</div>`;
}

function updateSortBarUI() {
  document.querySelectorAll('#sortBar .sort-btn').forEach(b => {
    const isActive = b.dataset.mode === state.viewMode;
    b.classList.toggle('is-active', isActive);
    const reversible = (b.dataset.mode === 'name' || b.dataset.mode === 'number');
    if (isActive && reversible) {
      b.textContent = `${b.dataset.label} ${state.sortDir === 'asc' ? '↑' : '↓'}`;
    } else {
      b.textContent = b.dataset.label;
    }
  });
}

function wireSortBar() {
  document.querySelectorAll('#sortBar .sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      const reversible = (mode === 'name' || mode === 'number');
      if (reversible && state.viewMode === mode) {
        // Re-clicking the same reversible mode flips the direction.
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.viewMode = mode;
        state.sortDir = 'asc';
      }
      updateSortBarUI();
      renderClasses();
    });
  });
}

async function load() {
  state.slug = getQueryParam('slug');
  state.ringNum = parseInt(getQueryParam('ring') || '1', 10);
  if (!state.slug || !Number.isFinite(state.ringNum)) {
    ringHeroError('Missing show or ring', 'Add ?slug=&lt;slug&gt;&amp;ring=&lt;n&gt;');
    return;
  }
  try {
    const [showRes, ringsRes, classesRes] = await Promise.all([
      fetchJson(`/v3/getShow?slug=${encodeURIComponent(state.slug)}`),
      fetchJson(`/v3/listRings?slug=${encodeURIComponent(state.slug)}`),
      fetchJson(`/v3/listClasses?slug=${encodeURIComponent(state.slug)}&ring=${state.ringNum}`),
    ]);
    state.show = showRes.show;
    state.ring = (ringsRes.rings || []).find(r => r.ring_num === state.ringNum);
    if (!state.ring) {
      ringHeroError(`Ring ${state.ringNum} not found`, '');
      return;
    }
    state.classes = classesRes.classes || [];
    renderHero();
    renderClasses();
    openLiveWS();
  } catch (e) {
    ringHeroError(`Couldn't load ring`, escapeHtml(e.message));
  }
}

// Subscribe to this ring's live snapshot so the class list can show a
// pulsing green dot on whichever class(es) are currently live (S46
// lock model). Single WS, auto-reconnect on drop. Re-renders the class
// list only when the live set actually changes — avoids paint thrash.
function openLiveWS() {
  const wsUrl = (WEST.api.BASE.replace(/^http/, 'ws')) +
    `/v3/live?slug=${encodeURIComponent(state.slug)}&ring_num=${state.ringNum}`;
  let ws;
  try { ws = new WebSocket(wsUrl); }
  catch (e) { return; }
  ws.addEventListener('message', (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.type !== 'snapshot' || !msg.data) return;
    const nextIds = new Set(
      (msg.data.live_class_ids || []).map(id => String(id))
    );
    // Diff vs current — only re-render when the set actually changed.
    let changed = nextIds.size !== state.liveClassIds.size;
    if (!changed) {
      for (const id of nextIds) { if (!state.liveClassIds.has(id)) { changed = true; break; } }
    }
    if (changed) {
      state.liveClassIds = nextIds;
      renderClasses();
    }
  });
  ws.addEventListener('close', () => {
    setTimeout(openLiveWS, 3000);
  });
  ws.addEventListener('error', () => { /* close handler reconnects */ });
}

wireSortBar();
load();
</script>

</body>
</html>
