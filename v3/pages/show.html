<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST Scoring — Show</title>
<link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="west.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo-tap">
      <img class="logo-img" src="../../assets/logo.png" alt="WEST">
      <span class="logo-west">WEST</span><span class="logo-sep">|</span><span class="logo-scoring">Scoring.Live</span>
    </a>
    <div class="header-tag">V3</div>
  </div>
</header>

<nav class="breadcrumbs" id="breadcrumbs">
  <a class="bc-link" href="index.html">All shows</a>
  <span class="bc-sep">/</span>
  <span class="bc-current" id="bcCurrent">…</span>
</nav>

<div id="hero" class="hero">
  <div class="spinner"></div>
</div>

<div class="section-block">
  <div class="section-block-title">Rings</div>
  <div id="rings"><div class="spinner"></div></div>
</div>

<div class="section-block" id="showStatsSection" style="display:none;">
  <div class="section-block-title">Show Stats <span class="section-block-sublabel" id="showStatsSubtitle"></span></div>
  <div id="showStats"></div>
</div>

<footer>
  WEST Timing and Scoring · <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> · <a href="admin.html" target="_blank" rel="noopener">Admin</a>
</footer>

<!-- Shared utilities: format helpers + API client. Single source of truth
     for escape, day labels, country flags, AUTH header, worker URL. -->
<script src="../js/west-format.js"></script>
<script src="../js/west-api.js"></script>
<script src="../js/west-display.js"></script>

<script>
const escapeHtml = WEST.format.escapeHtml;

function getSlug() {
  return WEST.api.queryParam('slug');
}

function fmtDateRange(show) {
  const f = (iso) => {
    if (!iso) return null;
    const p = iso.split('-');
    return p.length === 3 ? `${p[1]}-${p[2]}-${p[0]}` : iso;
  };
  const a = f(show.start_date);
  const b = f(show.end_date);
  if (!a && !b) return '';
  if (a && b && a === b) return a;
  if (a && b) return `${a} → ${b}`;
  return a || b;
}

function todayInTz(tz) {
  try {
    return new Date().toLocaleDateString('en-CA', { timeZone: tz || 'America/New_York' });
  } catch (e) {
    return new Date().toISOString().slice(0, 10);
  }
}

function deriveStatus(show) {
  // End date in show's local timezone is the hard ceiling — past 11:59pm
  // local on the last day, the show is complete regardless of stale status.
  const localToday = todayInTz(show.timezone);
  if (show.end_date && show.end_date < localToday) return 'complete';
  if (show.status === 'active') return 'active';
  if (show.status === 'complete' || show.status === 'archived') return show.status;
  if (show.start_date && show.end_date) {
    if (show.start_date > localToday) return 'upcoming';
    return 'active';
  }
  return show.status || 'pending';
}

function renderHero(show) {
  const status = deriveStatus(show);
  const dates = fmtDateRange(show);
  const parts = [];
  parts.push(`<div class="hero-name">${escapeHtml(show.name)}</div>`);
  if (dates) parts.push(`<div class="hero-dates">${escapeHtml(dates)}</div>`);
  if (show.venue) parts.push(`<div class="hero-venue">${escapeHtml(show.venue)}</div>`);
  if (show.location) parts.push(`<div class="hero-location">${escapeHtml(show.location)}</div>`);
  parts.push(WEST.display.statusBadge(status));
  document.getElementById('hero').innerHTML = parts.join('');
  document.getElementById('bcCurrent').textContent = show.name || show.slug;
  document.title = `${show.name} — WEST Scoring`;
}

function renderRings(rings, classCounts) {
  const root = document.getElementById('rings');
  if (!rings.length) {
    root.innerHTML = '<div class="placeholder">No rings yet.</div>';
    return;
  }
  const slug = getSlug();
  const html = rings.map(r => {
    const count = classCounts[r.ring_num] || 0;
    const countLabel = count === 1 ? '1 class' : `${count} classes`;
    return `<a class="ring-card" href="ring.html?slug=${encodeURIComponent(slug)}&ring=${r.ring_num}">
      <div class="ring-card-num">R${r.ring_num}</div>
      <div class="ring-card-body">
        <div class="ring-card-name">${escapeHtml(r.name || `Ring ${r.ring_num}`)}</div>
        <div class="ring-card-meta">${countLabel}</div>
      </div>
      <div class="ring-card-chevron">›</div>
    </a>`;
  }).join('');
  root.innerHTML = `<div class="ring-grid">${html}</div>`;
}

function countByRing(classes) {
  const out = {};
  for (const c of classes) {
    if (c.deleted_at) continue;
    out[c.ring_num] = (out[c.ring_num] || 0) + 1;
  }
  return out;
}

const fetchJson = WEST.api.fetchJson;

async function load() {
  const slug = getSlug();
  if (!slug) {
    document.getElementById('hero').innerHTML = '<div class="hero-name">No show specified</div><div class="hero-location">Add ?slug=&lt;slug&gt; to the URL</div>';
    document.getElementById('rings').innerHTML = '';
    return;
  }
  try {
    const [showRes, ringsRes, classesRes] = await Promise.all([
      fetchJson(`/v3/getShow?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listRings?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listClasses?slug=${encodeURIComponent(slug)}`),
    ]);
    renderHero(showRes.show);
    renderRings(ringsRes.rings || [], countByRing(classesRes.classes || []));
    // Show-level jumper stats — only render when there's actually a
    // jumper class in the show. Hunter-only shows skip this section
    // since the endpoint is jumper-only by design.
    const hasJumperClass = (classesRes.classes || []).some(c => c.class_type === 'J' || c.class_type === 'T');
    if (hasJumperClass) loadShowStats(slug);
  } catch (e) {
    document.getElementById('hero').innerHTML = `<div class="hero-name">Couldn't load show</div><div class="hero-location">${escapeHtml(e.message)}</div>`;
    document.getElementById('rings').innerHTML = '';
  }
}

// Show-level jumper stats fetch + render. ETag-aware (same smart-poll
// pattern as stats.html); show-level changes slowly so we use a
// looser 30s cadence vs class stats' 10s.
const SHOW_STATS_POLL_MS = 30000;
let showStatsEtag = null;
let showStatsTimer = null;

async function loadShowStats(slug) {
  try {
    const fetched = await WEST.api.fetchJsonEtag(`/v3/listShowJumperStats?slug=${encodeURIComponent(slug)}`, showStatsEtag);
    if (fetched.notModified) return;
    showStatsEtag = fetched.etag;
    renderShowStats(fetched.data.stats);
    if (!showStatsTimer) {
      showStatsTimer = setInterval(() => loadShowStats(slug), SHOW_STATS_POLL_MS);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) loadShowStats(slug);
      });
    }
  } catch (e) {
    console.warn('[show stats]', e.message);
  }
}

function renderShowStats(stats) {
  const root = document.getElementById('showStats');
  const section = document.getElementById('showStatsSection');
  const subtitle = document.getElementById('showStatsSubtitle');

  // Hide entirely when nothing to show (no jumper classes, no entries).
  if (!stats || (stats.classes_total || 0) === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  subtitle.textContent = `${stats.classes_total} jumper class${stats.classes_total === 1 ? '' : 'es'} · ${stats.total_entries} entries`;

  const html = [];

  // Top riders + horses side-by-side leaderboards.
  if ((stats.top_riders && stats.top_riders.length) || (stats.top_horses && stats.top_horses.length)) {
    html.push(`<div class="ss-leaderboards">`);
    if (stats.top_riders && stats.top_riders.length) {
      html.push(renderLeaderboard('Top Riders', stats.top_riders, r => ({
        name: r.rider, wins: r.wins, podiums: r.podiums, sub: `${r.classes_entered} class${r.classes_entered === 1 ? '' : 'es'}`,
      })));
    }
    if (stats.top_horses && stats.top_horses.length) {
      html.push(renderLeaderboard('Top Horses', stats.top_horses, h => ({
        name: h.horse, wins: h.wins, podiums: h.podiums, sub: h.sample_rider || '',
      })));
    }
    html.push(`</div>`);
  }

  // Championship list — when there are championship classes.
  if (stats.championships && stats.championships.length) {
    html.push(`<div class="ss-sub-label">Championships</div><div class="ss-champ-list">`);
    for (const c of stats.championships) {
      html.push(`<div class="ss-champ-row">
        <div class="ss-champ-class"><span class="ss-champ-num">${escapeHtml(c.class_id)}</span> <span class="ss-champ-name">${escapeHtml(c.class_name || '—')}</span></div>
        ${c.champion ? `<div class="ss-champ-line"><span class="ss-champ-tag ss-champ-tag-ch">Ch</span> ${escapeHtml(c.champion.horse_name || '')} <span class="ss-champ-rider">— ${escapeHtml(c.champion.rider_name || '')}</span></div>` : ''}
        ${c.reserve  ? `<div class="ss-champ-line"><span class="ss-champ-tag ss-champ-tag-res">Res</span> ${escapeHtml(c.reserve.horse_name || '')} <span class="ss-champ-rider">— ${escapeHtml(c.reserve.rider_name || '')}</span></div>` : ''}
      </div>`);
    }
    html.push(`</div>`);
  }

  root.innerHTML = html.join('');
}

function renderLeaderboard(title, rows, fmt) {
  const items = rows.map((r, i) => {
    const f = fmt(r);
    return `<div class="ss-lb-row">
      <span class="ss-lb-rank">${i + 1}</span>
      <div class="ss-lb-body">
        <div class="ss-lb-name">${escapeHtml(f.name || '—')}</div>
        ${f.sub ? `<div class="ss-lb-sub">${escapeHtml(f.sub)}</div>` : ''}
      </div>
      <span class="ss-lb-stat">
        <span class="ss-lb-wins">${f.wins}</span><span class="ss-lb-stat-lbl">W</span>
        <span class="ss-lb-pods">${f.podiums}</span><span class="ss-lb-stat-lbl">P</span>
      </span>
    </div>`;
  }).join('');
  return `<div class="ss-lb">
    <div class="ss-lb-title">${escapeHtml(title)}</div>
    ${items}
  </div>`;
}

load();
</script>

</body>
</html>
