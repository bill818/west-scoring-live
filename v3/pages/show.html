<!-- Shared utilities: format helpers + API client. Single source of truth
     for escape, day labels, country flags, AUTH header, worker URL. -->
<script src="../js/west-format.js"></script>
<script src="../js/west-api.js"></script>
<script src="../js/west-display.js"></script>

<script>
const escapeHtml = WEST.format.escapeHtml;

function getSlug() {
  return WEST.api.queryParam('slug');
}

function fmtDateRange(show) {
  const f = (iso) => {
    if (!iso) return null;
    const p = iso.split('-');
    return p.length === 3 ? `${p[1]}-${p[2]}-${p[0]}` : iso;
  };
  const a = f(show.start_date);
  const b = f(show.end_date);
  if (!a && !b) return '';
  if (a && b && a === b) return a;
  if (a && b) return `${a} → ${b}`;
  return a || b;
}

function todayInTz(tz) {
  try {
    return new Date().toLocaleDateString('en-CA', { timeZone: tz || 'America/New_York' });
  } catch (e) {
    return new Date().toISOString().slice(0, 10);
  }
}

function deriveStatus(show) {
  // End date in show's local timezone is the hard ceiling — past 11:59pm
  // local on the last day, the show is complete regardless of stale status.
  const localToday = todayInTz(show.timezone);
  if (show.end_date && show.end_date < localToday) return 'complete';
  if (show.status === 'active') return 'active';
  if (show.status === 'complete' || show.status === 'archived') return show.status;
  if (show.start_date && show.end_date) {
    if (show.start_date > localToday) return 'upcoming';
    return 'active';
  }
  return show.status || 'pending';
}

function showInitials(name) {
  return String(name || '?').split(/\s+/).slice(0, 2).map(w => (w[0] || '').toUpperCase()).join('') || '?';
}

function renderHero(show) {
  const status = deriveStatus(show);
  const dates = fmtDateRange(show);
  const initials = showInitials(show.name);

  // Logo source priority: admin-uploaded R2 URL first, then file
  // convention. If both fail, the cell falls back to a placeholder
  // showing the show's initials (handled inline by the onerror).
  const logoUrl = show.logo_url
    ? `${WEST.api.BASE}/v3/showLogo?slug=${encodeURIComponent(show.slug)}`
    : `../../assets/show-logos/${encodeURIComponent(show.slug)}.png`;
  const logoCell = show.logo_url
    ? `<div class="show-hero-logo"><img src="${logoUrl}" alt="" onerror="this.parentElement.classList.add('placeholder');this.replaceWith(document.createTextNode('${initials}'));"></div>`
    : `<div class="show-hero-logo placeholder">${initials}</div>`;

  // Right-side pill — same family used on the index page so the visual
  // language stays consistent. Live > active > upcoming > past.
  let pill = '';
  if (status === 'active' && show.class_live) {
    pill = `<span class="live-pill"><span class="dot"></span>Live now</span>`;
  } else if (status === 'active') {
    pill = `<span class="upcoming-pill">In progress</span>`;
  } else if (status === 'upcoming') {
    pill = `<span class="upcoming-pill">Upcoming</span>`;
  } else if (status === 'complete' || status === 'archived') {
    pill = `<span class="past-pill">Complete</span>`;
  }

  // Meta line: dates + (optional) "Day N of M" if the show is currently running.
  let metaLine = escapeHtml(dates || '');
  if (status === 'active' && show.start_date && show.end_date) {
    const localToday = todayInTz(show.timezone);
    const dayNum  = Math.max(1, Math.floor((new Date(localToday) - new Date(show.start_date)) / 86400000) + 1);
    const total   = Math.floor((new Date(show.end_date) - new Date(show.start_date)) / 86400000) + 1;
    if (dayNum >= 1 && dayNum <= total) metaLine += ` · Day ${dayNum} of ${total}`;
  }

  // Location line: location · venue (when both exist), as mono caps.
  const locParts = [show.location, show.venue].filter(Boolean).map(escapeHtml);
  const locLine = locParts.join(' · ');

  document.getElementById('hero').innerHTML = `
    ${logoCell}
    <div class="show-hero-text">
      <div class="show-hero-name">${escapeHtml(show.name)}</div>
      ${metaLine ? `<div class="show-hero-meta">${metaLine}</div>` : ''}
      ${locLine  ? `<div class="show-hero-loc">${locLine}</div>` : ''}
    </div>
    <div class="show-hero-side">
      ${pill}
    </div>`;
  document.getElementById('bcCurrent').textContent = show.name || show.slug;
  document.title = `${show.name} — WEST Scoring`;
}

/* ── Weather helpers (ported from v2) ─────────────────────────── */
function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code >= 1 && code <= 3) return '⛅';
  if (code >= 45 && code <= 48) return '🌫️';
  if (code >= 51 && code <= 67) return '🌧️';
  if (code >= 71 && code <= 77) return '🌨️';
  if (code >= 80 && code <= 82) return '🌦️';
  if (code >= 95 && code <= 99) return '⛈️';
  return '☀️';
}
function weatherDesc(code) {
  if (code === 0) return 'Clear';
  if (code >= 1 && code <= 3) return 'Partly Cloudy';
  if (code >= 45 && code <= 48) return 'Foggy';
  if (code >= 51 && code <= 55) return 'Drizzle';
  if (code >= 56 && code <= 57) return 'Freezing Drizzle';
  if (code >= 61 && code <= 65) return 'Rain';
  if (code >= 66 && code <= 67) return 'Freezing Rain';
  if (code >= 71 && code <= 77) return 'Snow';
  if (code >= 80 && code <= 82) return 'Rain Showers';
  if (code >= 95 && code <= 99) return 'Thunderstorm';
  return 'Clear';
}
function dayLabel(iso) {
  try {
    return new Date(iso + 'T12:00:00').toLocaleDateString('en-US',
      { weekday: 'short', month: 'short', day: 'numeric' });
  } catch (e) { return iso; }
}

/* Direct Open-Meteo current-temp probe — independent of the worker
   endpoint (which gives day-level high/low). Cached 30min. */
async function loadCurrentWeather(show) {
  if (!show || !show.location) return;
  const cacheKey = 'weather_now_' + show.slug;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) {
    try {
      const c = JSON.parse(cached);
      if (c.ts && (Date.now() - c.ts) < 30 * 60 * 1000) {
        renderCurrentWeather(c.data, show.location);
        return;
      }
    } catch (e) {}
  }
  try {
    const city = show.location.split(',')[0].trim();
    const geoR = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
    if (!geoR.ok) return;
    const geo = await geoR.json();
    if (!geo.results || !geo.results.length) return;
    const lat = geo.results[0].latitude, lon = geo.results[0].longitude;
    const wxR = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon
      + '&current=temperature_2m,weathercode&timezone=America/New_York&temperature_unit=fahrenheit');
    if (!wxR.ok) return;
    const wx = await wxR.json();
    sessionStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: wx }));
    renderCurrentWeather(wx, show.location);
  } catch (e) { /* silent — weather is optional */ }
}

function renderCurrentWeather(wx, loc) {
  if (!wx || !wx.current) return;
  const cur = wx.current;
  const el = document.getElementById('weatherCurrent');
  el.className = 'weather-now';
  el.innerHTML = `
    <span class="weather-now-icon">${weatherIcon(cur.weathercode)}</span>
    <div>
      <div class="weather-now-temp">${Math.round(cur.temperature_2m)}°</div>
      <div class="weather-now-desc">${escapeHtml(weatherDesc(cur.weathercode))}</div>
    </div>
    <div class="weather-now-loc">${escapeHtml(loc)}</div>`;
  document.getElementById('weatherStrip').style.display = '';
}

/* Show-week forecast — calls /v3/getShowWeather which caches in D1. */
async function loadShowWeather(show) {
  if (!show || !show.start_date) return;
  // Only render the forecast row when it's relevant (within 3 days of
  // start, OR during show, OR completed shows where historical readings
  // are interesting). Skip far-future shows where forecast would be
  // forecast-of-a-forecast.
  const today = todayInTz(show.timezone);
  const daysUntil = Math.floor((new Date(show.start_date) - new Date(today)) / 86400000);
  const daysSinceEnd = show.end_date
    ? Math.floor((new Date(today) - new Date(show.end_date)) / 86400000)
    : 0;
  if (daysUntil > 7) return;        // too far out, forecast would be junk
  if (daysSinceEnd > 60) return;    // ancient history — don't bother
  try {
    const fetched = await fetchJson(`/v3/getShowWeather?slug=${encodeURIComponent(show.slug)}`);
    if (!fetched.days || !fetched.days.length) return;
    renderShowWeatherDays(fetched.days, today);
  } catch (e) { /* silent */ }
}

function renderShowWeatherDays(days, todayIso) {
  const root = document.getElementById('weatherDays');
  root.innerHTML = days.map(d => {
    const isToday = d.date === todayIso;
    const high = d.temp_high != null ? Math.round(d.temp_high) + '°' : '—';
    const low  = d.temp_low  != null ? Math.round(d.temp_low)  + '°' : '';
    const precipIn = d.precip_mm ? (d.precip_mm / 25.4).toFixed(2) + 'in' : '';
    const wind = d.wind_max ? Math.round(d.wind_max) + ' mph' : '';
    const extras = [];
    if (precipIn) extras.push(`<span class="weather-day-precip">${precipIn}</span>`);
    if (wind)     extras.push(`<span class="weather-day-wind">${wind}</span>`);
    const label = isToday ? `Today` : escapeHtml(dayLabel(d.date));
    return `<div class="weather-day${isToday ? ' today' : ''}">
      <div class="weather-day-label">${label}</div>
      <div class="weather-day-icon">${weatherIcon(d.weather_code || 0)}</div>
      <div class="weather-day-high">${high}</div>
      ${low ? `<div class="weather-day-low">${low}</div>` : ''}
      ${extras.length ? `<div class="weather-day-extras">${extras.join('')}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('weatherStrip').style.display = '';
}

function countByRing(classes) {
  const out = {};
  for (const c of classes) {
    if (c.deleted_at) continue;
    out[c.ring_num] = (out[c.ring_num] || 0) + 1;
  }
  return out;
}

// Group classes by ring_num, sort each group most-recent first, take top 3.
// Used to render the inline class preview under live rings (parallels what
// /v3/listShowsWithRings emits on the index page).
function recentClassesByRing(classes) {
  const byRing = {};
  for (const c of classes) {
    if (c.deleted_at) continue;
    (byRing[c.ring_num] || (byRing[c.ring_num] = [])).push(c);
  }
  for (const k in byRing) {
    byRing[k].sort((a, b) => {
      const ad = a.scheduled_date || '';
      const bd = b.scheduled_date || '';
      if (ad !== bd) return bd.localeCompare(ad);
      return String(b.class_id).localeCompare(String(a.class_id));
    });
    byRing[k] = byRing[k].slice(0, 3);
  }
  return byRing;
}

function renderRings(rings, classes) {
  const root = document.getElementById('ringsSection');
  if (!rings.length) {
    root.innerHTML = `<div class="section-banner standalone">Rings <span class="count">0 rings</span></div>`;
    return;
  }
  const slug = getSlug();
  const counts = countByRing(classes);
  const recent = recentClassesByRing(classes);

  // Section banner: total ring count + (when active) live ring count.
  // The class API doesn't carry per-ring class_live yet on this endpoint,
  // so for now the banner just shows total rings — once the show page
  // shifts to /v3/listShowsWithRings (or class_live per ring is added to
  // /v3/listClasses), wire the live pulse here too.
  const totalRings = rings.length;
  const ringWord = totalRings === 1 ? 'ring' : 'rings';
  let html = `<div class="section-banner">Rings <span class="count">${totalRings} ${ringWord}</span></div>`;
  html += '<ul class="section-rows">';
  for (const r of rings) {
    const ringName = escapeHtml(r.name || `Ring ${r.ring_num}`);
    const ringCount = counts[r.ring_num] || 0;
    const countLabel = ringCount === 1 ? '1 class' : `${ringCount} classes`;
    const ringRecent = recent[r.ring_num] || [];

    // Inline class preview when the ring has classes worth surfacing.
    // Each class row gets a pulsing green dot when it's currently LIVE
    // per the S46 lock model (r.live_class_ids set by /v3/listRings).
    // Note: show.html is page-load fresh — no WS — so the dot reflects
    // state at load time. Reload the page for a refresh.
    let preview = '';
    if (ringRecent.length) {
      const liveSet = new Set(
        (r.live_class_ids || []).map(id => String(id))
      );
      preview = `<div class="ring-preview">
        <div class="ring-preview-title">Recent classes</div>
        <ul class="ring-class-list">`;
      for (const c of ringRecent) {
        const classUrl = `class.html?slug=${encodeURIComponent(slug)}&ring=${r.ring_num}&class=${encodeURIComponent(c.class_id)}`;
        const isLive = liveSet.has(String(c.class_id));
        const rowCls = isLive ? 'ring-class is-live' : 'ring-class';
        const dot = isLive ? '<span class="cls-live-dot"></span>' : '';
        preview += `<li><a class="${rowCls}" href="${classUrl}">
          <span class="cls-num">${dot}${escapeHtml(c.class_id)}</span>
          <span class="cls-name">${escapeHtml(c.class_name || '—')}</span>
        </a></li>`;
      }
      preview += '</ul></div>';
    }

    // "Live" pill — only rendered when the worker reports this ring has a
    // recent scoring frame (class_live, set by /v3/listRings's KV lookup).
    // event.stopPropagation prevents the row's outer link from firing too.
    const livePill = r.class_live
      ? `<a class="live-pill" href="live.html?slug=${encodeURIComponent(slug)}&ring_num=${r.ring_num}" onclick="event.stopPropagation();"><span class="dot"></span>Live</a>`
      : '';

    // Live banner under the ring row when ring is live (Bill 2026-05-06).
    // "Live" = the LIVE-state lock model (B+intro pair OR cls_lock) —
    // r.class_live is sourced from snapshot.is_live in /v3/listRings.
    // Lists which class id(s) are live so the spectator knows what
    // they'd be tuning into. Click anywhere on the banner to open
    // the live page for the ring.
    let liveBanner = '';
    if (r.class_live) {
      const liveUrl = `live.html?slug=${encodeURIComponent(slug)}&ring_num=${r.ring_num}`;
      const liveIds = Array.isArray(r.live_class_ids) ? r.live_class_ids : [];
      const classBits = liveIds.length
        ? `<span class="live-banner-classes">Class${liveIds.length === 1 ? '' : 'es'} ${liveIds.map(escapeHtml).join(', ')}</span>`
        : '';
      liveBanner = `<a class="ring-live-banner" href="${liveUrl}">
        <span class="ring-live-dot"></span>
        <span class="ring-live-text">${ringName} is currently <strong>Live</strong></span>
        ${classBits}
        <span class="ring-live-cta">Watch ▸</span>
      </a>`;
    }

    html += `<li class="ring-row-item">
      <a class="ring-row" href="ring.html?slug=${encodeURIComponent(slug)}&ring=${r.ring_num}">
        <div class="ring-row-badge"><div class="num">${r.ring_num}</div><div class="lbl">RING</div></div>
        <div class="ring-row-info">
          <div class="ring-row-name">${ringName}</div>
          <div class="ring-row-meta">${countLabel}</div>
        </div>
        <div class="ring-row-right">
          ${livePill}
          <span class="ring-row-chevron">▸</span>
        </div>
      </a>
      ${liveBanner}
      ${preview}
    </li>`;
  }
  html += '</ul>';
  root.innerHTML = html;
}

const fetchJson = WEST.api.fetchJson;

function showHeroError(title, sub) {
  // The hero is a 3-col grid (logo | text | side) — span the whole row
  // for a clean error message instead of trying to fit the grid shape.
  document.getElementById('hero').innerHTML = `
    <div style="grid-column: 1 / -1;">
      <div class="show-hero-name" style="font-size: 28px;">${escapeHtml(title)}</div>
      ${sub ? `<div class="show-hero-loc">${sub}</div>` : ''}
    </div>`;
  document.getElementById('ringsSection').innerHTML = '';
  document.getElementById('weatherStrip').style.display = 'none';
  document.getElementById('showStatsSection').style.display = 'none';
}

async function load() {
  const slug = getSlug();
  if (!slug) {
    showHeroError('No show specified', 'Add ?slug=&lt;slug&gt; to the URL');
    return;
  }
  try {
    const [showRes, ringsRes, classesRes] = await Promise.all([
      fetchJson(`/v3/getShow?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listRings?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listClasses?slug=${encodeURIComponent(slug)}`),
    ]);
    renderHero(showRes.show);
    // Pass the raw classes array — renderRings derives both counts and
    // recent-classes from it (the previous signature took a pre-computed
    // count dict, but that lost the data needed for the inline preview).
    renderRings(ringsRes.rings || [], classesRes.classes || []);
    // Weather — current-temp + show-dates forecast. Both fail silently
    // (weather is optional, never blocks page load).
    loadCurrentWeather(showRes.show);
    loadShowWeather(showRes.show);
    // Show-level jumper stats — only render when there's actually a
    // jumper class in the show. Hunter-only shows skip this section
    // since the endpoint is jumper-only by design.
    const hasJumperClass = (classesRes.classes || []).some(c => c.class_type === 'J' || c.class_type === 'T');
    if (hasJumperClass) loadShowStats(slug);
  } catch (e) {
    showHeroError(`Couldn't load show`, escapeHtml(e.message));
  }
}

// Show-level jumper stats fetch + render. ETag-aware (same smart-poll
// pattern as stats.html); show-level changes slowly so we use a
// looser 30s cadence vs class stats' 10s.
const SHOW_STATS_POLL_MS = 30000;
let showStatsEtag = null;
let showStatsTimer = null;

async function loadShowStats(slug) {
  try {
    const fetched = await WEST.api.fetchJsonEtag(`/v3/listShowJumperStats?slug=${encodeURIComponent(slug)}`, showStatsEtag);
    if (fetched.notModified) return;
    showStatsEtag = fetched.etag;
    renderShowStats(fetched.data.stats);
    if (!showStatsTimer) {
      showStatsTimer = setInterval(() => loadShowStats(slug), SHOW_STATS_POLL_MS);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) loadShowStats(slug);
      });
    }
  } catch (e) {
    console.warn('[show stats]', e.message);
  }
}

function renderShowStats(stats) {
  const section = document.getElementById('showStatsSection');

  // Hide entirely when nothing to show (no jumper classes, no entries).
  if (!stats || (stats.classes_total || 0) === 0) {
    section.style.display = 'none';
    section.innerHTML = '';
    return;
  }
  section.style.display = '';

  const subtitle = `${stats.classes_total} jumper class${stats.classes_total === 1 ? '' : 'es'} · ${stats.total_entries} entries`;
  const html = [];

  // Stats banner + leaderboard card grid (top riders / horses).
  const hasRiders  = stats.top_riders && stats.top_riders.length;
  const hasHorses  = stats.top_horses && stats.top_horses.length;
  if (hasRiders || hasHorses) {
    html.push(`<div class="section-banner standalone">Show stats <span class="count">${escapeHtml(subtitle)}</span></div>`);
    html.push('<div class="stats-grid">');
    if (hasRiders) {
      html.push(renderLeaderboardCard('Top Riders', stats.top_riders, r => ({
        name: r.rider,
        stats: [
          { num: r.blues,  lbl: 'Blues' },
          { num: r.clears, lbl: 'Clears' },
          { num: r.top3,   lbl: 'Top 3' },
        ],
        sub: `${r.classes_entered} class${r.classes_entered === 1 ? '' : 'es'}`,
      })));
    }
    if (hasHorses) {
      html.push(renderLeaderboardCard('Top Horses', stats.top_horses, h => ({
        name: h.horse,
        stats: [
          { num: fmtMoney(h.money_won), lbl: 'Won' },
        ],
        sub: h.sample_rider || '',
      })));
    }
    html.push('</div>');
  }

  // Championship banner + champion/reserve lines.
  if (stats.championships && stats.championships.length) {
    const champCount = stats.championships.length;
    html.push(`<div class="section-banner">Championships <span class="count">${champCount} division${champCount === 1 ? '' : 's'} awarded</span></div>`);
    html.push('<ul class="section-rows">');
    for (const c of stats.championships) {
      html.push(`<li class="champ-row">
        <div class="champ-cls"><span class="num">${escapeHtml(c.class_id)}</span>${escapeHtml(c.class_name || '—')}</div>
        ${c.champion ? `<div class="champ-line"><span class="champ-tag champ-tag-ch">Ch</span>${escapeHtml(c.champion.horse_name || '')} <span class="champ-rider">— ${escapeHtml(c.champion.rider_name || '')}</span></div>` : ''}
        ${c.reserve  ? `<div class="champ-line"><span class="champ-tag champ-tag-res">Res</span>${escapeHtml(c.reserve.horse_name || '')} <span class="champ-rider">— ${escapeHtml(c.reserve.rider_name || '')}</span></div>` : ''}
      </li>`);
    }
    html.push('</ul>');
  }

  section.innerHTML = html.join('');
}

function renderLeaderboardCard(title, rows, fmt) {
  const items = rows.map((r, i) => {
    const f = fmt(r);
    const statsHtml = (f.stats || []).map(s =>
      `<span class="num">${escapeHtml(String(s.num))}</span><span class="lbl">${escapeHtml(s.lbl)}</span>`
    ).join('');
    return `<div class="lb-row">
      <span class="lb-rank">${i + 1}</span>
      <div>
        <div class="lb-name">${escapeHtml(f.name || '—')}</div>
        ${f.sub ? `<div class="lb-sub">${escapeHtml(f.sub)}</div>` : ''}
      </div>
      <span class="lb-stat">${statsHtml}</span>
    </div>`;
  }).join('');
  return `<div class="stat-card">
    <div class="stat-card-title">${escapeHtml(title)}</div>
    ${items}
  </div>`;
}

// Money formatter — $7,500 / $25,000 / etc. Whole dollars (no cents
// in prize money). Returns "$0" for zero/negative — caller should
// already have filtered those rows out via HAVING but we render
// safely either way.
function fmtMoney(n) {
  const v = Number(n) || 0;
  return '$' + Math.round(v).toLocaleString('en-US');
}

load();
</script>
