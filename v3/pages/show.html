<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST Scoring — Show</title>
<link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="west.css">
<style>
  /* Page-specific extras: weather card. The .hero-row / .hero-logo /
     .hero-text layout is in west.css so ring.html + class.html share. */

  .weather-section {
    max-width: 1100px; margin: 0 auto; padding: 8px 12px 0;
  }
  .weather-current {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .weather-current-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .weather-current-temp {
    font-family: 'Oswald', sans-serif;
    font-weight: 700; font-size: 20px; color: var(--black); line-height: 1;
  }
  .weather-current-desc {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-muted); margin-top: 2px;
  }
  .weather-current-loc {
    margin-left: auto;
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.04em; color: #aaa;
  }
  .weather-days {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .weather-day {
    flex: 1; min-width: 90px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 8px;
    text-align: center;
  }
  .weather-day.today {
    border-color: var(--red); box-shadow: 0 0 0 1px var(--red);
  }
  .weather-day-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .weather-day.today .weather-day-label { color: var(--red); }
  .weather-day-icon { font-size: 22px; line-height: 1; margin-bottom: 4px; }
  .weather-day-high {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 16px; color: var(--black); line-height: 1;
  }
  .weather-day-low {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); margin-top: 1px;
  }
  .weather-day-extras {
    display: flex; flex-direction: column; gap: 1px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    margin-top: 3px;
  }
  .weather-day-precip { color: #4a90d9; }
  .weather-day-wind   { color: #999; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo-tap">
      <img class="logo-img" src="../../assets/logo.png" alt="WEST">
      <span class="logo-west">WEST</span><span class="logo-sep">|</span><span class="logo-scoring">Scoring.Live</span>
    </a>
    <div class="header-tag">V3</div>
  </div>
</header>

<nav class="breadcrumbs" id="breadcrumbs">
  <a class="bc-link" href="index.html">All shows</a>
  <span class="bc-sep">/</span>
  <span class="bc-current" id="bcCurrent">…</span>
</nav>

<div id="hero" class="hero">
  <div class="spinner"></div>
</div>

<div class="weather-section" id="weatherSection" style="display:none;">
  <div id="weatherCurrent"></div>
  <div id="weatherDays" class="weather-days"></div>
</div>

<div class="section-block">
  <div class="section-block-title">Rings</div>
  <div id="rings"><div class="spinner"></div></div>
</div>

<div class="section-block" id="showStatsSection" style="display:none;">
  <div class="section-block-title">Show Stats <span class="section-block-sublabel" id="showStatsSubtitle"></span></div>
  <div id="showStats"></div>
</div>

<footer>
  WEST Timing and Scoring · <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> · <a href="admin.html" target="_blank" rel="noopener">Admin</a>
</footer>

<!-- Shared utilities: format helpers + API client. Single source of truth
     for escape, day labels, country flags, AUTH header, worker URL. -->
<script src="../js/west-format.js"></script>
<script src="../js/west-api.js"></script>
<script src="../js/west-display.js"></script>

<script>
const escapeHtml = WEST.format.escapeHtml;

function getSlug() {
  return WEST.api.queryParam('slug');
}

function fmtDateRange(show) {
  const f = (iso) => {
    if (!iso) return null;
    const p = iso.split('-');
    return p.length === 3 ? `${p[1]}-${p[2]}-${p[0]}` : iso;
  };
  const a = f(show.start_date);
  const b = f(show.end_date);
  if (!a && !b) return '';
  if (a && b && a === b) return a;
  if (a && b) return `${a} → ${b}`;
  return a || b;
}

function todayInTz(tz) {
  try {
    return new Date().toLocaleDateString('en-CA', { timeZone: tz || 'America/New_York' });
  } catch (e) {
    return new Date().toISOString().slice(0, 10);
  }
}

function deriveStatus(show) {
  // End date in show's local timezone is the hard ceiling — past 11:59pm
  // local on the last day, the show is complete regardless of stale status.
  const localToday = todayInTz(show.timezone);
  if (show.end_date && show.end_date < localToday) return 'complete';
  if (show.status === 'active') return 'active';
  if (show.status === 'complete' || show.status === 'archived') return show.status;
  if (show.start_date && show.end_date) {
    if (show.start_date > localToday) return 'upcoming';
    return 'active';
  }
  return show.status || 'pending';
}

function renderHero(show) {
  const status = deriveStatus(show);
  const dates = fmtDateRange(show);
  // Logo source priority:
  //   1. show.logo_url present → worker /v3/showLogo (uploaded via admin)
  //   2. fallback: file convention at assets/show-logos/<slug>.png
  // Either way, onerror hides the <img> when there's no logo at all.
  const logoUrl = show.logo_url
    ? `${WEST.api.BASE}/v3/showLogo?slug=${encodeURIComponent(show.slug)}`
    : `../../assets/show-logos/${encodeURIComponent(show.slug)}.png`;
  const text = [];
  text.push(`<div class="hero-name">${escapeHtml(show.name)}</div>`);
  if (dates) text.push(`<div class="hero-dates">${escapeHtml(dates)}</div>`);
  if (show.venue) text.push(`<div class="hero-venue">${escapeHtml(show.venue)}</div>`);
  if (show.location) text.push(`<div class="hero-location">${escapeHtml(show.location)}</div>`);
  text.push(WEST.display.statusBadge(status));
  document.getElementById('hero').innerHTML = `
    <div class="hero-row">
      <img class="hero-logo" src="${logoUrl}" alt="" onerror="this.style.display='none'">
      <div class="hero-text">${text.join('')}</div>
    </div>`;
  document.getElementById('bcCurrent').textContent = show.name || show.slug;
  document.title = `${show.name} — WEST Scoring`;
}

/* ── Weather helpers (ported from v2) ─────────────────────────── */
function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code >= 1 && code <= 3) return '⛅';
  if (code >= 45 && code <= 48) return '🌫️';
  if (code >= 51 && code <= 67) return '🌧️';
  if (code >= 71 && code <= 77) return '🌨️';
  if (code >= 80 && code <= 82) return '🌦️';
  if (code >= 95 && code <= 99) return '⛈️';
  return '☀️';
}
function weatherDesc(code) {
  if (code === 0) return 'Clear';
  if (code >= 1 && code <= 3) return 'Partly Cloudy';
  if (code >= 45 && code <= 48) return 'Foggy';
  if (code >= 51 && code <= 55) return 'Drizzle';
  if (code >= 56 && code <= 57) return 'Freezing Drizzle';
  if (code >= 61 && code <= 65) return 'Rain';
  if (code >= 66 && code <= 67) return 'Freezing Rain';
  if (code >= 71 && code <= 77) return 'Snow';
  if (code >= 80 && code <= 82) return 'Rain Showers';
  if (code >= 95 && code <= 99) return 'Thunderstorm';
  return 'Clear';
}
function dayLabel(iso) {
  try {
    return new Date(iso + 'T12:00:00').toLocaleDateString('en-US',
      { weekday: 'short', month: 'short', day: 'numeric' });
  } catch (e) { return iso; }
}

/* Direct Open-Meteo current-temp probe — independent of the worker
   endpoint (which gives day-level high/low). Cached 30min. */
async function loadCurrentWeather(show) {
  if (!show || !show.location) return;
  const cacheKey = 'weather_now_' + show.slug;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) {
    try {
      const c = JSON.parse(cached);
      if (c.ts && (Date.now() - c.ts) < 30 * 60 * 1000) {
        renderCurrentWeather(c.data, show.location);
        return;
      }
    } catch (e) {}
  }
  try {
    const city = show.location.split(',')[0].trim();
    const geoR = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
    if (!geoR.ok) return;
    const geo = await geoR.json();
    if (!geo.results || !geo.results.length) return;
    const lat = geo.results[0].latitude, lon = geo.results[0].longitude;
    const wxR = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon
      + '&current=temperature_2m,weathercode&timezone=America/New_York&temperature_unit=fahrenheit');
    if (!wxR.ok) return;
    const wx = await wxR.json();
    sessionStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: wx }));
    renderCurrentWeather(wx, show.location);
  } catch (e) { /* silent — weather is optional */ }
}

function renderCurrentWeather(wx, loc) {
  if (!wx || !wx.current) return;
  const cur = wx.current;
  const el = document.getElementById('weatherCurrent');
  el.className = 'weather-current';
  el.innerHTML = `
    <span class="weather-current-icon">${weatherIcon(cur.weathercode)}</span>
    <div>
      <div class="weather-current-temp">${Math.round(cur.temperature_2m)}°F</div>
      <div class="weather-current-desc">${escapeHtml(weatherDesc(cur.weathercode))}</div>
    </div>
    <div class="weather-current-loc">${escapeHtml(loc)}</div>`;
  document.getElementById('weatherSection').style.display = '';
}

/* Show-week forecast — calls /v3/getShowWeather which caches in D1. */
async function loadShowWeather(show) {
  if (!show || !show.start_date) return;
  // Only render the forecast row when it's relevant (within 3 days of
  // start, OR during show, OR completed shows where historical readings
  // are interesting). Skip far-future shows where forecast would be
  // forecast-of-a-forecast.
  const today = todayInTz(show.timezone);
  const daysUntil = Math.floor((new Date(show.start_date) - new Date(today)) / 86400000);
  const daysSinceEnd = show.end_date
    ? Math.floor((new Date(today) - new Date(show.end_date)) / 86400000)
    : 0;
  if (daysUntil > 7) return;        // too far out, forecast would be junk
  if (daysSinceEnd > 60) return;    // ancient history — don't bother
  try {
    const fetched = await fetchJson(`/v3/getShowWeather?slug=${encodeURIComponent(show.slug)}`);
    if (!fetched.days || !fetched.days.length) return;
    renderShowWeatherDays(fetched.days, today);
  } catch (e) { /* silent */ }
}

function renderShowWeatherDays(days, todayIso) {
  const root = document.getElementById('weatherDays');
  root.innerHTML = days.map(d => {
    const isToday = d.date === todayIso;
    const high = d.temp_high != null ? Math.round(d.temp_high) + '°' : '—';
    const low  = d.temp_low  != null ? Math.round(d.temp_low)  + '°' : '';
    const precipIn = d.precip_mm ? (d.precip_mm / 25.4).toFixed(2) + 'in' : '';
    const wind = d.wind_max ? Math.round(d.wind_max) + ' mph' : '';
    const extras = [];
    if (precipIn) extras.push(`<span class="weather-day-precip">${precipIn}</span>`);
    if (wind)     extras.push(`<span class="weather-day-wind">${wind}</span>`);
    return `<div class="weather-day${isToday ? ' today' : ''}">
      <div class="weather-day-label">${escapeHtml(dayLabel(d.date))}</div>
      <div class="weather-day-icon">${weatherIcon(d.weather_code || 0)}</div>
      <div class="weather-day-high">${high}</div>
      ${low ? `<div class="weather-day-low">${low}</div>` : ''}
      ${extras.length ? `<div class="weather-day-extras">${extras.join('')}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('weatherSection').style.display = '';
}

function renderRings(rings, classCounts) {
  const root = document.getElementById('rings');
  if (!rings.length) {
    root.innerHTML = '<div class="placeholder">No rings yet.</div>';
    return;
  }
  const slug = getSlug();
  const html = rings.map(r => {
    const count = classCounts[r.ring_num] || 0;
    const countLabel = count === 1 ? '1 class' : `${count} classes`;
    return `<a class="ring-card" href="ring.html?slug=${encodeURIComponent(slug)}&ring=${r.ring_num}">
      <div class="ring-card-num">R${r.ring_num}</div>
      <div class="ring-card-body">
        <div class="ring-card-name">${escapeHtml(r.name || `Ring ${r.ring_num}`)}</div>
        <div class="ring-card-meta">${countLabel}</div>
      </div>
      <div class="ring-card-chevron">›</div>
    </a>`;
  }).join('');
  root.innerHTML = `<div class="ring-grid">${html}</div>`;
}

function countByRing(classes) {
  const out = {};
  for (const c of classes) {
    if (c.deleted_at) continue;
    out[c.ring_num] = (out[c.ring_num] || 0) + 1;
  }
  return out;
}

const fetchJson = WEST.api.fetchJson;

async function load() {
  const slug = getSlug();
  if (!slug) {
    document.getElementById('hero').innerHTML = '<div class="hero-name">No show specified</div><div class="hero-location">Add ?slug=&lt;slug&gt; to the URL</div>';
    document.getElementById('rings').innerHTML = '';
    return;
  }
  try {
    const [showRes, ringsRes, classesRes] = await Promise.all([
      fetchJson(`/v3/getShow?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listRings?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listClasses?slug=${encodeURIComponent(slug)}`),
    ]);
    renderHero(showRes.show);
    renderRings(ringsRes.rings || [], countByRing(classesRes.classes || []));
    // Weather — current-temp + show-dates forecast. Both fail silently
    // (weather is optional, never blocks page load).
    loadCurrentWeather(showRes.show);
    loadShowWeather(showRes.show);
    // Show-level jumper stats — only render when there's actually a
    // jumper class in the show. Hunter-only shows skip this section
    // since the endpoint is jumper-only by design.
    const hasJumperClass = (classesRes.classes || []).some(c => c.class_type === 'J' || c.class_type === 'T');
    if (hasJumperClass) loadShowStats(slug);
  } catch (e) {
    document.getElementById('hero').innerHTML = `<div class="hero-name">Couldn't load show</div><div class="hero-location">${escapeHtml(e.message)}</div>`;
    document.getElementById('rings').innerHTML = '';
  }
}

// Show-level jumper stats fetch + render. ETag-aware (same smart-poll
// pattern as stats.html); show-level changes slowly so we use a
// looser 30s cadence vs class stats' 10s.
const SHOW_STATS_POLL_MS = 30000;
let showStatsEtag = null;
let showStatsTimer = null;

async function loadShowStats(slug) {
  try {
    const fetched = await WEST.api.fetchJsonEtag(`/v3/listShowJumperStats?slug=${encodeURIComponent(slug)}`, showStatsEtag);
    if (fetched.notModified) return;
    showStatsEtag = fetched.etag;
    renderShowStats(fetched.data.stats);
    if (!showStatsTimer) {
      showStatsTimer = setInterval(() => loadShowStats(slug), SHOW_STATS_POLL_MS);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) loadShowStats(slug);
      });
    }
  } catch (e) {
    console.warn('[show stats]', e.message);
  }
}

function renderShowStats(stats) {
  const root = document.getElementById('showStats');
  const section = document.getElementById('showStatsSection');
  const subtitle = document.getElementById('showStatsSubtitle');

  // Hide entirely when nothing to show (no jumper classes, no entries).
  if (!stats || (stats.classes_total || 0) === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  subtitle.textContent = `${stats.classes_total} jumper class${stats.classes_total === 1 ? '' : 'es'} · ${stats.total_entries} entries`;

  const html = [];

  // Top riders + horses side-by-side leaderboards.
  if ((stats.top_riders && stats.top_riders.length) || (stats.top_horses && stats.top_horses.length)) {
    html.push(`<div class="ss-leaderboards">`);
    if (stats.top_riders && stats.top_riders.length) {
      html.push(renderLeaderboard('Top Riders', stats.top_riders, r => ({
        name: r.rider, wins: r.wins, podiums: r.podiums, sub: `${r.classes_entered} class${r.classes_entered === 1 ? '' : 'es'}`,
      })));
    }
    if (stats.top_horses && stats.top_horses.length) {
      html.push(renderLeaderboard('Top Horses', stats.top_horses, h => ({
        name: h.horse, wins: h.wins, podiums: h.podiums, sub: h.sample_rider || '',
      })));
    }
    html.push(`</div>`);
  }

  // Championship list — when there are championship classes.
  if (stats.championships && stats.championships.length) {
    html.push(`<div class="ss-sub-label">Championships</div><div class="ss-champ-list">`);
    for (const c of stats.championships) {
      html.push(`<div class="ss-champ-row">
        <div class="ss-champ-class"><span class="ss-champ-num">${escapeHtml(c.class_id)}</span> <span class="ss-champ-name">${escapeHtml(c.class_name || '—')}</span></div>
        ${c.champion ? `<div class="ss-champ-line"><span class="ss-champ-tag ss-champ-tag-ch">Ch</span> ${escapeHtml(c.champion.horse_name || '')} <span class="ss-champ-rider">— ${escapeHtml(c.champion.rider_name || '')}</span></div>` : ''}
        ${c.reserve  ? `<div class="ss-champ-line"><span class="ss-champ-tag ss-champ-tag-res">Res</span> ${escapeHtml(c.reserve.horse_name || '')} <span class="ss-champ-rider">— ${escapeHtml(c.reserve.rider_name || '')}</span></div>` : ''}
      </div>`);
    }
    html.push(`</div>`);
  }

  root.innerHTML = html.join('');
}

function renderLeaderboard(title, rows, fmt) {
  const items = rows.map((r, i) => {
    const f = fmt(r);
    return `<div class="ss-lb-row">
      <span class="ss-lb-rank">${i + 1}</span>
      <div class="ss-lb-body">
        <div class="ss-lb-name">${escapeHtml(f.name || '—')}</div>
        ${f.sub ? `<div class="ss-lb-sub">${escapeHtml(f.sub)}</div>` : ''}
      </div>
      <span class="ss-lb-stat">
        <span class="ss-lb-wins">${f.wins}</span><span class="ss-lb-stat-lbl">W</span>
        <span class="ss-lb-pods">${f.podiums}</span><span class="ss-lb-stat-lbl">P</span>
      </span>
    </div>`;
  }).join('');
  return `<div class="ss-lb">
    <div class="ss-lb-title">${escapeHtml(title)}</div>
    ${items}
  </div>`;
}

load();
</script>

</body>
</html>
