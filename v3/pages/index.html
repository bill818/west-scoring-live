     directory so we don't per-show these. og:image is an absolute prod

<link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<header class="app-header">
  <a href="index.html" class="brand">
    <div class="brand-mark"><img src="../../assets/logo.png" alt="WEST"></div>
    <div class="brand-name">WEST</div>
    <span class="brand-tag">SCORING.LIVE</span>
  </a>
  <nav class="app-nav">
    <a href="index.html">Shows</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<div class="idx-page-head">
  <h1 class="idx-page-title">Shows</h1>
  <div class="idx-page-sub">Live timing &amp; scoring for the hunter/jumper circuit</div>
  <div class="idx-toolbar">
    <input type="search" id="searchInput" class="idx-filter" placeholder="Filter by name, venue, or location…" oninput="filter()" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="idx-tabs" role="tablist">
      <button class="idx-tab active" data-view="current" onclick="setView('current')">Current <span class="count" id="countCurrent">0</span></button>
      <button class="idx-tab" data-view="previous" onclick="setView('previous')">Previous <span class="count" id="countPrevious">0</span></button>
    </div>
  </div>
</div>

<div class="page">
  <div id="content">
    <div class="spinner"></div>
  </div>
  <div class="no-results" id="noResults"><h2>No shows match your search</h2></div>
</div>

<footer>
  WEST Timing and Scoring · Powered by Ryegate · <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a>
</footer>

<script>
// No auth key here — the spectator landing page only reads the public
// show directory (/v3/listShowsWithRings is public). The machine key no
// longer ships in any browser page. Bill 2026-05-16.
const BASE = 'https://west-worker.bill-acb.workers.dev';

let SHOWS = [];
let VIEW  = 'current'; // 'current' (active+upcoming) | 'previous' (past)

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function todayInTz(tz) {
  // YYYY-MM-DD in show's local time. en-CA locale gives ISO format.
  try {
    return new Date().toLocaleDateString('en-CA', { timeZone: tz || 'America/New_York' });
  } catch (e) {
    return new Date().toISOString().slice(0, 10);
  }
}

function showGroup(show) {
  // Lifecycle: built=pending → heartbeat=active → past end_date=past.
  // end_date is the hard ceiling — once a show's last day has passed
  // (in the show's local timezone) it belongs in 'past' regardless of
  // any stale status flag.
  const localToday = todayInTz(show.timezone);
  if (show.end_date && show.end_date < localToday) return 'past';
  if (show.status === 'active') return 'active';
  if (show.status === 'complete' || show.status === 'archived') return 'past';
  return 'upcoming';
}

function fmtDateRange(show) {
  if (!show.start_date && !show.end_date) return '—';
  const f = (iso) => {
    if (!iso) return '?';
    const p = iso.split('-');
    return p.length === 3 ? `${p[1]}-${p[2]}-${p[0]}` : iso;
  };
  if (show.start_date === show.end_date) return f(show.start_date);
  return `${f(show.start_date)} → ${f(show.end_date)}`;
}

function daysBetween(isoA, isoB) {
  const a = new Date(isoA + 'T00:00:00Z');
  const b = new Date(isoB + 'T00:00:00Z');
  return Math.floor((b - a) / 86400000);
}

function showInitials(name) {
  return String(name || '?').split(/\s+/).slice(0, 2).map(w => (w[0] || '').toUpperCase()).join('') || '?';
}

function startsInLabel(s) {
  if (!s.start_date) return 'Soon';
  const today = todayInTz(s.timezone);
  const days = daysBetween(today, s.start_date);
  if (days <= 0) return 'Starts today';
  if (days === 1) return 'In 1 day';
  if (days < 14) return `In ${days} days`;
  if (days < 60) return `In ${Math.round(days / 7)} weeks`;
  return s.start_date;
}

function endedAgoLabel(s) {
  if (!s.end_date) return 'Wrapped';
  const today = todayInTz(s.timezone);
  const days = daysBetween(s.end_date, today);
  if (days <= 0) return 'Just wrapped';
  if (days === 1) return '1 day ago';
  if (days < 14) return `${days} days ago`;
  if (days < 60) return `${Math.round(days / 7)} weeks ago`;
  return fmtDateRange(s);
}

function applyFilter(shows) {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) return shows.slice();
  return shows.filter(s =>
    (s.name || '').toLowerCase().includes(q) ||
    (s.slug || '').toLowerCase().includes(q) ||
    (s.location || '').toLowerCase().includes(q) ||
    (s.venue || '').toLowerCase().includes(q)
  );
}

function setView(v) {
  VIEW = v;
  document.querySelectorAll('.idx-tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  render();
}

function filter() { render(); }

function renderShowRow(s, key, expandRings) {
  const logoUrl = s.logo_url
    ? `${BASE}/v3/showLogo?slug=${encodeURIComponent(s.slug)}`
    : `../../assets/show-logos/${encodeURIComponent(s.slug)}.png`;
  const initials = showInitials(s.name);

  // Right-meta pill — varies by lifecycle.
  let pill = '';
  if (key === 'active') {
    const liveRings = (s.rings || []).filter(r => r.class_live).length;
    pill = liveRings
      ? `<span class="live-pill"><span class="dot"></span>${liveRings} ring${liveRings === 1 ? '' : 's'} live</span>`
      : `<span class="upcoming-pill">In progress</span>`;
  } else if (key === 'upcoming') {
    pill = `<span class="upcoming-pill">${escapeHtml(startsInLabel(s))}</span>`;
  } else if (key === 'past') {
    pill = `<span class="past-pill">${escapeHtml(endedAgoLabel(s))}</span>`;
  }

  // Date line + a cheap day-count cue (real data, client-derived — the
  // fuller lab tags line of country/discipline/entries needs a backend
  // aggregation pass, tracked separately). Single-day shows omit it.
  let dateLine = fmtDateRange(s);
  if (s.start_date && s.end_date && s.start_date !== s.end_date) {
    const span = daysBetween(s.start_date, s.end_date) + 1;
    if (span > 1) dateLine += ` · ${span}-day`;
  }
  const locLine  = escapeHtml(s.location || s.venue || '');

  // Build the (optional) ring preview as a sibling block — keeps the show
  // row a clean <a> and lets ring-class items also be <a> without nesting.
  const rings = (s.rings || []).filter(r => (r.classes || []).length > 0);
  let preview = '';
  if (expandRings && rings.length) {
    preview = '<div class="ring-preview">';
    for (const r of rings) {
      const ringLabel = escapeHtml(r.name || '');
      preview += `<div class="ring-block">
        <div class="ring-label"><span class="ring-badge">R${r.ring_num}</span>${ringLabel}</div>
        <ul class="ring-classes">`;
      for (const c of r.classes) {
        const liveCls = c.class_live ? ' is-live' : '';
        const classUrl = `class.html?slug=${encodeURIComponent(s.slug)}&ring=${r.ring_num}&class=${encodeURIComponent(c.class_id)}`;
        preview += `<li><a class="ring-class${liveCls}" href="${classUrl}">
          <span class="cls-num">${escapeHtml(c.class_id)}</span>
          <span class="cls-name">${escapeHtml(c.class_name || '—')}</span>
        </a></li>`;
      }
      preview += '</ul></div>';
    }
    preview += '</div>';
  }

  // Logo cell: uses an <img> if logo_url is present, else a placeholder
  // with the show's initials. The onerror swap covers the file-convention
  // fallback path failing (404) — convert the cell to a placeholder in
  // place so the row stays the same shape.
  const logoCell = s.logo_url
    ? `<div class="show-logo-cell"><img src="${logoUrl}" alt="" onerror="this.parentElement.classList.add('placeholder');this.replaceWith(document.createTextNode('${initials}'));"></div>`
    : `<div class="show-logo-cell placeholder">${initials}</div>`;

  return `<li class="show-row-item">
    <a class="show-row" href="show.html?slug=${encodeURIComponent(s.slug)}">
      ${logoCell}
      <div class="show-info">
        <div class="show-name">${escapeHtml(s.name)}</div>
        <div class="show-dates">${dateLine}</div>
        ${locLine ? `<div class="show-loc">${locLine}</div>` : ''}
      </div>
      <div class="show-meta-right">
        ${pill}
        <span class="show-chevron">▸</span>
      </div>
    </a>
    ${preview}
  </li>`;
}

function render() {
  const content   = document.getElementById('content');
  const noResults = document.getElementById('noResults');

  const filtered = applyFilter(SHOWS);
  const groups = { active: [], upcoming: [], past: [] };
  for (const s of filtered) groups[showGroup(s)].push(s);

  // Tab counts always reflect what's filterable, regardless of which tab is active.
  document.getElementById('countCurrent').textContent  = groups.active.length + groups.upcoming.length;
  document.getElementById('countPrevious').textContent = groups.past.length;

  // Pick which sections to render based on the active tab.
  // Active shows are expanded by default; "just wrapped" past shows
  // (within 3 days) also get the ring preview so spectators can see
  // recently-completed classes.
  const sections = (VIEW === 'current')
    ? [
        { key: 'active',   label: 'Active',        shows: groups.active,   expand: true  },
        { key: 'upcoming', label: 'Upcoming',      shows: groups.upcoming, expand: false },
      ]
    : [
        { key: 'past',     label: 'Past shows',    shows: groups.past,     expand: false },
      ];
  const visibleSections = sections.filter(s => s.shows.length);

  if (!visibleSections.length) {
    content.innerHTML = '';
    if (!SHOWS.length) {
      content.innerHTML = '<div class="empty-state"><h2>No shows yet</h2><p>Nothing scheduled. Check back soon.</p></div>';
      noResults.style.display = 'none';
    } else {
      noResults.style.display = 'block';
    }
    return;
  }
  noResults.style.display = 'none';

  let html = '';
  for (const sec of visibleSections) {
    // Section banner — adds the live pulse + " · N rings live" suffix
    // when any show in the section has a currently-scoring ring.
    const liveRings = sec.shows.reduce(
      (n, s) => n + (s.rings || []).filter(r => r.class_live).length, 0
    );
    const liveSuffix = liveRings ? ` · ${liveRings} ring${liveRings === 1 ? '' : 's'} live` : '';
    const bannerCls  = liveRings ? 'section-banner live' : 'section-banner';
    const showWord   = sec.shows.length === 1 ? 'show' : 'shows';
    html += `<div class="${bannerCls}">${sec.label} <span class="count">${sec.shows.length} ${showWord}${liveSuffix}</span></div>`;
    html += '<ul class="section-rows">';
    for (const s of sec.shows) {
      // For past shows, expand ring preview only if within 3-day "just wrapped" window.
      let expandRings = sec.expand;
      if (sec.key === 'past') {
        const ended = s.end_date ? new Date(s.end_date + 'T23:59:59') : null;
        const daysSinceEnd = ended ? Math.floor((Date.now() - ended.getTime()) / 86400000) : 0;
        expandRings = daysSinceEnd <= 3;
      }
      html += renderShowRow(s, sec.key, expandRings);
    }
    html += '</ul>';
  }
  content.innerHTML = html;
}

async function loadShows() {
  const content = document.getElementById('content');
  try {
    const res = await fetch(BASE + '/v3/listShowsWithRings');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    SHOWS = data.shows || [];
    render();
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><h2>Couldn't load shows</h2><p>${escapeHtml(e.message)}</p></div>`;
  }
}

loadShows();
setInterval(loadShows, 60000);
</script>

</body>
</html>
