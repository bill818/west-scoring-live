<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST Scoring — v3</title>
<link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="west.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo-tap">
      <img class="logo-img" src="../../assets/logo.png" alt="WEST">
      <span class="logo-west">WEST</span><span class="logo-sep">|</span><span class="logo-scoring">Scoring.Live</span>
    </a>
    <div class="header-tag">V3</div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="active-block">
      <div class="active-num" id="statNumber">—</div>
      <div class="active-lbl">Active<br>Shows</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadShows()">↻ Refresh</button>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="5" stroke="#888" stroke-width="1.5"/>
      <path d="M10.5 10.5L14 14" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="search" id="searchInput" class="search-input" placeholder="Search shows…" oninput="filter()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <select id="yearSelect" class="year-sel" onchange="filter()">
    <option value="recent">Recent</option>
  </select>
</div>

<div class="page">
  <div id="content">
    <div class="spinner"></div>
  </div>
  <div class="no-results" id="noResults"><h2>No shows match your search</h2></div>
</div>

<footer>
  WEST Timing and Scoring · <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> · <a href="admin.html" target="_blank" rel="noopener">Admin</a>
</footer>

<script>
const AUTH = 'west-scoring-2026';
const BASE = 'https://west-worker.bill-acb.workers.dev';

let SHOWS = [];

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function todayInTz(tz) {
  // YYYY-MM-DD in show's local time. en-CA locale gives ISO format.
  try {
    return new Date().toLocaleDateString('en-CA', { timeZone: tz || 'America/New_York' });
  } catch (e) {
    return new Date().toISOString().slice(0, 10);
  }
}

function showGroup(show) {
  // Lifecycle: built=pending → heartbeat=active → past end_date=past.
  // end_date is the hard ceiling — once a show's last day has passed
  // (in the show's local timezone) it belongs in 'past' regardless of
  // any stale status flag.
  const localToday = todayInTz(show.timezone);
  if (show.end_date && show.end_date < localToday) return 'past';
  if (show.status === 'active') return 'active';
  if (show.status === 'complete' || show.status === 'archived') return 'past';
  return 'upcoming';
}

function fmtDateRange(show) {
  if (!show.start_date && !show.end_date) return '—';
  const f = (iso) => {
    if (!iso) return '?';
    const p = iso.split('-');
    return p.length === 3 ? `${p[1]}-${p[2]}-${p[0]}` : iso;
  };
  if (show.start_date === show.end_date) return f(show.start_date);
  return `${f(show.start_date)} → ${f(show.end_date)}`;
}

function daysBetween(isoA, isoB) {
  const a = new Date(isoA + 'T00:00:00Z');
  const b = new Date(isoB + 'T00:00:00Z');
  return Math.floor((b - a) / 86400000);
}

function buildYearDropdown() {
  const sel = document.getElementById('yearSelect');
  const years = {};
  SHOWS.forEach(s => {
    const y = s.start_date ? s.start_date.slice(0, 4) : null;
    if (y) years[y] = true;
  });
  const sorted = Object.keys(years).sort().reverse();
  const current = sel.value || 'recent';
  sel.innerHTML = '<option value="recent">Recent</option>';
  for (const y of sorted) {
    sel.innerHTML += `<option value="${y}">${y}</option>`;
  }
  sel.innerHTML += '<option value="all">All Shows</option>';
  // Restore prior selection if still valid
  if ([...sel.options].some(o => o.value === current)) sel.value = current;
}

function applyFilter(shows) {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const year = document.getElementById('yearSelect').value;
  const today = new Date().toISOString().slice(0, 10);

  let pool = shows.slice();

  // year filter
  if (year === 'recent') {
    // Recent = end_date within 90 days forward OR backward, OR undated (show anyway)
    pool = pool.filter(s => {
      if (!s.end_date && !s.start_date) return true;
      const end = s.end_date || s.start_date;
      if (!end) return true;
      return Math.abs(daysBetween(today, end)) <= 90;
    });
  } else if (year !== 'all') {
    pool = pool.filter(s => (s.start_date || '').slice(0, 4) === year);
  }

  // search filter
  if (q) {
    pool = pool.filter(s =>
      (s.name || '').toLowerCase().includes(q) ||
      (s.slug || '').toLowerCase().includes(q)
    );
  }

  // auto-fallback: if Recent yields nothing AND there's no search, try all
  if (year === 'recent' && !q && !pool.length && shows.length) {
    pool = shows.slice();
  }

  return pool;
}

function filter() { render(); }

function render() {
  const content = document.getElementById('content');
  const noResults = document.getElementById('noResults');
  const today = new Date().toISOString().slice(0, 10);

  const filtered = applyFilter(SHOWS);

  // Active count always reflects truly-active shows regardless of filter
  const activeCount = SHOWS.filter(s => showGroup(s) === 'active').length;
  document.getElementById('statNumber').textContent = activeCount;

  if (!filtered.length) {
    content.innerHTML = '';
    noResults.style.display = SHOWS.length ? 'block' : 'none';
    if (!SHOWS.length) {
      content.innerHTML = '<div class="empty-state"><h2>No shows yet</h2><p>Nothing scheduled. Check back soon.</p></div>';
    }
    return;
  }
  noResults.style.display = 'none';

  const groups = { active: [], upcoming: [], past: [] };
  for (const s of filtered) groups[showGroup(s)].push(s);

  const order = [
    ['active', 'Active now'],
    ['upcoming', 'Upcoming'],
    ['past', 'Past shows'],
  ];
  let html = '';
  for (const [key, label] of order) {
    if (!groups[key].length) continue;
    html += `<div class="group"><div class="group-header">${label} (${groups[key].length})</div><ul class="show-list">`;
    for (const s of groups[key]) {
      // Prefer admin-uploaded logo (logo_url set on the show row → served
      // by worker from R2). Fall back to file convention so any logos
      // dropped at assets/show-logos/<slug>.png pre-upload still render.
      const logoUrl = s.logo_url
        ? `${BASE}/v3/showLogo?slug=${encodeURIComponent(s.slug)}`
        : `../../assets/show-logos/${encodeURIComponent(s.slug)}.png`;

      // Per-ring "what's running" preview (v2 pattern). Each ring shows
      // its three most-recent classes-with-entries. Rings with no entered
      // classes are skipped.
      const rings = (s.rings || []).filter(r => (r.classes || []).length > 0);
      let preview = '';
      if (rings.length) {
        preview = '<div class="show-rings-preview">';
        for (const r of rings) {
          const ringLabel = r.name || `Ring ${r.ring_num}`;
          preview += `<div class="show-ring-block">
            <div class="show-ring-hdr">
              <span class="show-ring-num">R${r.ring_num}</span>
              <span class="show-ring-name">${escapeHtml(ringLabel)}</span>
            </div>
            <ul class="show-ring-classes">`;
          for (const c of r.classes) {
            const classUrl = `class.html?slug=${encodeURIComponent(s.slug)}&ring=${r.ring_num}&class=${encodeURIComponent(c.class_id)}`;
            preview += `<li><a class="show-ring-class" href="${classUrl}" onclick="event.stopPropagation();">
              <span class="cls-num">${escapeHtml(c.class_id)}</span>
              <span class="cls-name">${escapeHtml(c.class_name || '—')}</span>
            </a></li>`;
          }
          preview += '</ul></div>';
        }
        preview += '</div>';
      }

      const dotClasses = `${key}${s.class_live ? ' live' : ''}`;
      html += `<li><div class="show-card-wrap">
        <a class="show-card" href="show.html?slug=${encodeURIComponent(s.slug)}">
          <span class="show-dot ${dotClasses}" title="${s.class_live ? 'Class live now' : ''}"></span>
          <img class="show-card-logo" src="${logoUrl}" alt="" onerror="this.style.display='none'">
          <div class="show-body">
            <div class="show-name">${escapeHtml(s.name)}</div>
            <div class="show-meta">${[fmtDateRange(s), escapeHtml(s.location || s.venue || '')].filter(Boolean).join(' · ')}</div>
          </div>
        </a>
        ${preview}
      </div></li>`;
    }
    html += `</ul></div>`;
  }
  content.innerHTML = html;
}

async function loadShows() {
  const content = document.getElementById('content');
  try {
    const res = await fetch(BASE + '/v3/listShowsWithRings', { headers: { 'X-West-Key': AUTH } });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    SHOWS = data.shows || [];
    buildYearDropdown();
    render();
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><h2>Couldn't load shows</h2><p>${escapeHtml(e.message)}</p></div>`;
  }
}

loadShows();
setInterval(loadShows, 60000);
</script>

</body>
</html>
