<!DOCTYPE html>

<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST Scoring — Class</title>
<link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<header class="app-header">
  <a href="index.html" class="brand">
    <div class="brand-mark"><img src="../../assets/logo.png" alt="WEST"></div>
    <div class="brand-name">WEST</div>
    <span class="brand-tag">SCORING.LIVE</span>
  </a>
  <nav class="app-nav">
    <a href="index.html">Shows</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<nav class="breadcrumbs">
  <a class="bc-link" href="index.html">All shows</a>
  <span class="bc-sep">/</span>
  <a class="bc-link" id="bcShow" href="#">…</a>
  <span class="bc-sep">/</span>
  <a class="bc-link" id="bcRing" href="#">…</a>
  <span class="bc-sep">/</span>
  <span class="bc-current" id="bcClass">…</span>
</nav>

<div id="hero" class="show-hero">
  <div class="spinner" style="grid-column: 1 / 4;"></div>
</div>

<div id="notices" class="class-notices"></div>

<div class="section-banner standalone" id="resultsBanner">Results</div>
<div id="results"><div class="spinner"></div></div>

<footer>
  WEST Timing and Scoring · <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> · <a href="admin.html" target="_blank" rel="noopener">Admin</a>
</footer>

<!-- Shared modules (load before page script). Order matters: west-api +
     west-format have no deps; west-rules depends on west-status; jumper-
     templates depends on format/status/rules. -->
<script src="../js/west-api.js"></script>
<script src="../js/west-status.js"></script>
<script src="../js/west-format.js"></script>
<script src="../js/west-rules.js"></script>
<script src="../js/west-jumper-templates.js"></script>
<script src="../js/west-hunter-templates.js"></script>

<script>
const escapeHtml = WEST.format.escapeHtml;
const fetchJson = WEST.api.fetchJson;
const getQueryParam = WEST.api.queryParam;
const fmtDayLabel = WEST.format.dayLabel;

// Page state. Results layout is driven by the show's admin setting
// (shows.results_layout). Templates module defaults to 'stacked' when
// the field is missing, so older shows / pre-migration data still works.
// judgeGrid populated only for multi-judge hunter classes (see gate
// WEST.format.judgesGridApplies); null otherwise. Per-entry judges
// detail expands inline as a drop-down beneath each row when the
// entry is clicked — managed via DOM class toggle, not React-style
// re-render.
const state = { cls: null, entries: null, show: null, judgeGrid: null, judgeView: false };

function showInitials(name) {
  return String(name || '?').split(/\s+/).slice(0, 2).map(w => (w[0] || '').toUpperCase()).join('') || '?';
}

function renderHero(show, ring, cls) {
  const hero = document.getElementById('hero');
  const initials = showInitials(show.name);

  // Logo cell: parent show's logo at hero size — anchors the page in
  // its show context. Falls back to initials placeholder.
  const logoUrl = show.logo_url
    ? `${WEST.api.BASE}/v3/showLogo?slug=${encodeURIComponent(show.slug)}`
    : `../../assets/show-logos/${encodeURIComponent(show.slug)}.png`;
  const logoCell = show.logo_url
    ? `<div class="show-hero-logo"><img src="${logoUrl}" alt="" onerror="this.parentElement.classList.add('placeholder');this.replaceWith(document.createTextNode('${initials}'));"></div>`
    : `<div class="show-hero-logo placeholder">${initials}</div>`;

  // Meta line: show · ring · scheduled day. Ring number ("Ring 1") is
  // dropped when the ring has a custom name — the named form is already
  // in breadcrumbs and saying both is redundant.
  const ringLabel = ring.name || `Ring ${ring.ring_num}`;
  const metaParts = [escapeHtml(show.name), escapeHtml(ringLabel)];
  if (cls.scheduled_date) metaParts.push(escapeHtml(fmtDayLabel(cls.scheduled_date)));

  // Class description — method + scoring + judges + derby subtype.
  // Time-allowed summary (jumper-only). Both come from shared formatters.
  const methodStr = WEST.format.classDescription(cls);
  const taStr     = WEST.format.timeAllowedSummary(cls);

  // Side: Live button (only when this ring has a recent scoring frame —
  // gated by ring.class_live, populated by /v3/listRings) / Stats button
  // (jumper) / Judges toggle (multi-judge hunter) / Split-decision pill
  // (when judges disagreed). Same .hero-action and .split-pill rules from
  // west.css, just lifted into the hero side col.
  const sideParts = [];
  if (ring.class_live) {
    const liveUrl = `live.html?slug=${encodeURIComponent(show.slug)}&ring_num=${ring.ring_num}`;
    sideParts.push(`<a class="hero-action" href="${liveUrl}">▶ Watch Live</a>`);
  }
  if (cls.class_type === 'J' || cls.class_type === 'T') {
    const statsUrl = `stats.html?slug=${encodeURIComponent(show.slug)}&ring=${ring.ring_num}&class=${encodeURIComponent(cls.class_id)}`;
    sideParts.push(`<a class="hero-action" href="${statsUrl}">📊 Class Stats</a>`);
  }
  if (cls.class_type === 'H' && WEST.format.judgesGridApplies(cls) && state.judgeGrid) {
    const label = state.judgeView ? 'View Combined' : 'View Judges Cards';
    sideParts.push(`<button class="hero-action judges-toggle${state.judgeView ? ' is-active' : ''}" id="btnJudgeView">📋 ${label}</button>`);
    const judgeCount = Math.max(1, Number(cls.num_judges) || 1);
    const splitN = Number((show && show.split_decision_top_n)) || 3;
    if (WEST.rules.isSplitDecision(state.judgeGrid, judgeCount, splitN)) {
      sideParts.push('<span class="split-pill">Split Decision</span>');
    }
  }

  hero.innerHTML = `
    ${logoCell}
    <div class="show-hero-text">
      <div class="show-hero-name">${escapeHtml(cls.class_id)} · ${escapeHtml(cls.class_name || '—')}</div>
      <div class="show-hero-meta">${metaParts.join(' · ')}</div>
      ${methodStr ? `<div class="show-hero-loc">${escapeHtml(methodStr)}</div>` : ''}
      ${taStr ? `<div class="show-hero-loc" style="margin-top:2px;">${escapeHtml(taStr)}</div>` : ''}
      ${cls.sponsor ? `<div class="show-hero-sponsor">${escapeHtml(cls.sponsor)}</div>` : ''}
      ${cls.trophy ? `<div class="show-hero-trophy">${escapeHtml(cls.trophy)}</div>` : ''}
    </div>
    <div class="show-hero-side">
      ${sideParts.join('')}
    </div>`;

  // Judges-toggle handler — re-render the hero (to flip the button label)
  // and re-render results (to swap the table view).
  const btnJV = document.getElementById('btnJudgeView');
  if (btnJV) {
    btnJV.addEventListener('click', () => {
      state.judgeView = !state.judgeView;
      renderHero(state.show, ring, cls);
      renderResults();
    });
  }

  document.getElementById('bcShow').textContent = show.name;
  document.getElementById('bcShow').href = `show.html?slug=${encodeURIComponent(show.slug)}`;
  document.getElementById('bcRing').textContent = ring.name || `Ring ${ring.ring_num}`;
  document.getElementById('bcRing').href = `ring.html?slug=${encodeURIComponent(show.slug)}&ring=${ring.ring_num}`;
  document.getElementById('bcClass').textContent = `#${cls.class_id}`;
  document.title = `${cls.class_id} · ${cls.class_name || ''} — ${show.name}`;
}

function renderResults() {
  const root = document.getElementById('results');
  const banner = document.getElementById('resultsBanner');
  const cls = state.cls;
  const entries = state.entries;

  // Update the section banner with the live entry count.
  if (banner) {
    const n = entries.length;
    const word = n === 1 ? 'entry' : 'entries';
    banner.innerHTML = `Results <span class="count">${n} ${word}</span>`;
  }

  if (!entries.length) {
    root.innerHTML = '<div class="placeholder">No entries yet.</div>';
    return;
  }

  // Single source of truth — the templates module per lens decides
  // everything. Layout flows from the show's admin setting
  // (shows.results_layout); templates default to 'stacked'.
  const layout = state.show && state.show.results_layout;
  if (cls.class_type === 'H') {
    // By-judge view (multi-judge classes only) regroups the class by
    // judge. Combined view is the default — table with optional per-row
    // dropdown carrying that entry's full judge grid.
    if (state.judgeView && state.judgeGrid) {
      root.innerHTML = WEST.hunterTemplates.renderByJudgeView(cls, state.judgeGrid);
      return;
    }
    root.innerHTML = WEST.hunterTemplates.renderTable(cls, entries, {
      layout,
      judgeGrid: state.judgeGrid,
    });
    wireJudgeDropdowns();
    return;
  }
  if (cls.class_type === 'J' || cls.class_type === 'T') {
    root.innerHTML = WEST.jumperTemplates.renderTable(cls, entries, { layout });
  } else {
    root.innerHTML = '<div class="placeholder">Class type not yet supported on the public results page.</div>';
  }
}

// Attach click handlers to multi-judge hunter rows so clicking the
// row toggles the inline per-entry judges drop-down. Pure DOM toggle —
// no re-render. Detail row is rendered inline by the templates module
// next to the main row but hidden via CSS until .is-open is added.
function wireJudgeDropdowns() {
  document.querySelectorAll('tr.has-judges-toggle').forEach(row => {
    row.addEventListener('click', () => {
      const detail = row.nextElementSibling;
      if (!detail || !detail.classList.contains('judges-detail-row')) return;
      const willOpen = !detail.classList.contains('is-open');
      detail.classList.toggle('is-open', willOpen);
      row.classList.toggle('is-open', willOpen);
    });
  });
}

function renderNotices(cls) {
  const root = document.getElementById('notices');
  if (!root) return;
  const notices = WEST.format.classNotices(cls);
  if (!notices.length) { root.innerHTML = ''; return; }
  root.innerHTML = notices.map(n =>
    `<div class="class-notice">${escapeHtml(n)}</div>`
  ).join('');
}

function classHeroError(title, sub) {
  // Show-hero is a 3-col grid (logo | text | side) — span the whole row
  // for a clean error message instead of trying to fit the grid shape.
  document.getElementById('hero').innerHTML = `
    <div style="grid-column: 1 / -1;">
      <div class="show-hero-name" style="font-size: 28px;">${escapeHtml(title)}</div>
      ${sub ? `<div class="show-hero-loc">${sub}</div>` : ''}
    </div>`;
  document.getElementById('results').innerHTML = '';
  const banner = document.getElementById('resultsBanner');
  if (banner) banner.innerHTML = 'Results';
}

async function load() {
  const slug = getQueryParam('slug');
  const ringNum = parseInt(getQueryParam('ring') || '1', 10);
  const classNum = getQueryParam('class');
  if (!slug || !classNum || !Number.isFinite(ringNum)) {
    classHeroError('Missing parameters', 'Need ?slug=&lt;slug&gt;&amp;ring=&lt;n&gt;&amp;class=&lt;c&gt;');
    return;
  }
  try {
    // Three-call cascade: show + rings + classes for breadcrumbs/hero +
    // class lookup. Then a fourth call for entries once we know the
    // database PK for the class.
    const [showRes, ringsRes, classesRes] = await Promise.all([
      fetchJson(`/v3/getShow?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listRings?slug=${encodeURIComponent(slug)}`),
      fetchJson(`/v3/listClasses?slug=${encodeURIComponent(slug)}&ring=${ringNum}`),
    ]);
    const show = showRes.show;
    const ring = (ringsRes.rings || []).find(r => r.ring_num === ringNum);
    if (!ring) {
      classHeroError(`Ring ${ringNum} not found`, '');
      return;
    }
    const cls = (classesRes.classes || []).find(c => String(c.class_id) === String(classNum));
    if (!cls) {
      classHeroError(`Class ${escapeHtml(classNum)} not found`, '');
      return;
    }
    if (cls.deleted_at) {
      classHeroError(`Class ${escapeHtml(cls.class_id)} removed`, 'This class was removed from the show.');
      return;
    }
    // /v3/listEntries keys off the DB PK, not the .cls class number.
    // For multi-judge hunter classes we ALSO pull the judges grid —
    // grid renders below (or in place of) the standard combined table.
    const entriesPromise = fetchJson(`/v3/listEntries?class_id=${cls.id}`);
    const gridPromise = WEST.format.judgesGridApplies(cls)
      ? fetchJson(`/v3/listJudgeGrid?class_id=${cls.id}`).catch(e => {
          console.warn('judges grid fetch failed:', e.message);
          return null;
        })
      : Promise.resolve(null);
    const [entriesRes, gridRes] = await Promise.all([entriesPromise, gridPromise]);
    state.cls = cls;
    state.entries = entriesRes.entries || [];
    state.show = show;
    state.judgeGrid = gridRes;
    renderHero(show, ring, cls);
    renderNotices(cls);
    renderResults();
  } catch (e) {
    classHeroError(`Couldn't load class`, escapeHtml(e.message));
  }
}

load();
</script>

</body>
</html>
