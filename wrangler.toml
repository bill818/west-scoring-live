# Cloudflare Pages config for the westscoring project.
# The Cloudflare Worker (west-worker) uses wrangler.worker.toml — pass it via
# `wrangler deploy --config wrangler.worker.toml` so the two configs stay split.
# Pages doesn't accept a custom config path, so this file must be named
# wrangler.toml.
name = "westscoring"
pages_build_output_dir = "_pages_dist"
compatibility_date = "2024-01-01"
