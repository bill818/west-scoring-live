<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WEST Scoring Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #111111;
  --red: #b82025;
  --white: #ffffff;
  --off-white: #f5f5f5;
  --border: #e2e2e2;
  --text-muted: #777;
  --text-body: #333;
  --green: #2e7d32;
  --card-radius: 10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--off-white);color:var(--text-body);font-family:'Source Sans 3',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--black);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:50;}
.header-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:56px;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;color:#fff;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;text-decoration:none;min-width:44px;min-height:44px;padding:0;background:none;border:none;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.back-btn:hover{color:var(--red);}
.logo-tap{display:flex;align-items:center;gap:8px;text-decoration:none;margin-left:auto;}
.logo-img{height:26px;width:auto;filter:invert(1);}
.logo-west{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:#fff;}
.logo-sep{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);margin:0 3px;}
.logo-scoring{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);letter-spacing:.04em;}
@media(max-width:480px){.logo-west,.logo-sep,.logo-scoring{display:none;}}

/* BREADCRUMBS */
.breadcrumbs{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:0;min-height:40px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.breadcrumbs::-webkit-scrollbar{display:none;}
.bc-home{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--red);text-decoration:none;padding:10px 10px 10px 0;white-space:nowrap;flex-shrink:0;}
.bc-home:hover{color:var(--black);}
.bc-sep{font-family:'DM Mono',monospace;font-size:11px;color:#ccc;padding:0 6px;flex-shrink:0;user-select:none;}
.bc-current{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--text-muted);padding:10px 0;white-space:nowrap;flex-shrink:0;}

/* HERO */
.hero{background:#fff;border-bottom:1px solid var(--border);padding:24px 16px 20px;}
.hero-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--black);line-height:1.15;margin-bottom:6px;}
.hero-dates{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);letter-spacing:.04em;margin-bottom:8px;}
.hero-venue{font-size:15px;color:var(--text-body);margin-bottom:4px;}
.hero-location{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.04em;}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:3px;font-weight:600;margin-top:8px;}
.status-active{background:#e8f5e9;color:var(--green);}
.status-upcoming{background:#e3f2fd;color:#1565c0;}
.status-complete{background:#f5f5f5;color:#757575;}

/* WEATHER */
.weather-card{background:#fff;border:1px solid var(--border);border-radius:var(--card-radius);margin:16px 16px 0;overflow:hidden;display:none;}
.weather-card.loaded{display:block;opacity:0;animation:fadeUp .3s ease forwards;}
.weather-current{display:flex;align-items:center;gap:14px;padding:16px;}
.weather-icon{font-size:36px;line-height:1;flex-shrink:0;}
.weather-temp{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--black);line-height:1;}
.weather-desc{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.weather-loc{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;letter-spacing:.04em;margin-top:2px;}

/* SECTION HEADER */
.section-header{padding:20px 16px 8px;display:flex;align-items:baseline;gap:8px;}
.section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}

/* RING CARDS */
.ring-grid{display:grid;grid-template-columns:1fr;gap:10px;padding:0 16px 8px;}
.ring-card{background:#fff;border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;display:block;transition:transform .12s;opacity:0;animation:fadeUp .3s ease forwards;}
.ring-card:active{transform:scale(.98);}
.ring-card.single{max-width:480px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ring-top{padding:14px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.ring-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--black);line-height:1.2;flex:1;}
.ring-chevron{font-size:20px;color:#ccc;flex-shrink:0;}
.ring-meta{padding:0 16px 6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ring-live{display:inline-flex;align-items:center;gap:5px;color:var(--red);font-weight:600;}
.ring-live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:blink 1.6s ease-in-out infinite;flex-shrink:0;}
.ring-live-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 16px 10px;padding:10px 16px;background:var(--red);color:#fff;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;border-radius:6px;text-decoration:none;transition:background .1s;}
.ring-live-btn:hover{background:#8b1519;}
.ring-live-btn .ring-live-dot{background:#fff;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.ring-progress{margin:0 16px 14px;height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.ring-progress-bar{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease;}

/* STATS PREVIEW */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 8px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--card-radius);padding:16px 12px;text-align:center;}
.stat-value{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--black);line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
.stat-placeholder{color:#ccc;}

/* LEADERBOARDS */
.leaders-section{padding:0 16px 16px;}
.leaders-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:768px){.leaders-section{padding:0 clamp(16px,4vw,48px) 16px;}}
.leader-card{background:#fff;border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;opacity:0;animation:fadeUp .3s ease forwards;}
.leader-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.leader-header:hover{background:#fafafa;}
.leader-header-left{display:flex;flex-direction:column;gap:2px;}
.leader-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-weight:600;}
.leader-preview{font-size:12px;color:var(--text-body);font-weight:500;}
.leader-chevron{font-size:16px;color:#ccc;transition:transform .2s;flex-shrink:0;}
.leader-chevron.open{transform:rotate(180deg);}
.leader-body{display:none;border-top:1px solid var(--border);}
.leader-body.open{display:block;}
.leader-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.leader-row:last-child{border-bottom:none;}
.leader-rank{font-family:'DM Mono',monospace;font-size:11px;color:#bbb;min-width:20px;text-align:center;}
.leader-name{flex:1;min-width:0;}
.leader-primary{font-size:14px;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leader-secondary{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leader-stat{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--black);text-align:right;white-space:nowrap;}
.leader-stat-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);text-align:right;}

/* SEARCH */
.search-section{padding:0 16px 12px;}
@media(min-width:768px){.search-section{padding:0 clamp(16px,4vw,48px) 12px;}}
.search-wrap{position:relative;max-width:480px;}
.search-input{width:100%;padding:12px 16px 12px 40px;font-family:'Source Sans 3',sans-serif;font-size:15px;border:1px solid var(--border);border-radius:var(--card-radius);background:#fff;color:var(--text-body);outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--red);}
.search-input::placeholder{color:#bbb;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#bbb;cursor:pointer;padding:4px;display:none;font-size:18px;line-height:1;}
.search-clear:hover{color:var(--text-body);}
.search-clear.visible{display:block;}
.search-results{margin-top:10px;}
.search-match{background:#fff;border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;margin-bottom:10px;opacity:0;animation:fadeUp .3s ease forwards;}
.search-match-header{padding:14px 16px 10px;}
.search-match-horse{font-size:16px;font-weight:600;color:var(--black);}
.search-match-rider{font-size:12px;color:var(--text-muted);}
.search-match-meta{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;margin-top:2px;}
.search-class-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-top:1px solid var(--border);}
.search-class-place{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;min-width:28px;text-align:center;color:var(--black);}
.search-class-name{flex:1;font-size:13px;color:var(--text-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-class-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-align:right;}

/* STATES */
.state-box{text-align:center;padding:60px 20px;}
.spinner{width:28px;height:28px;border:3px solid #e8e8e8;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-lbl{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}

/* FOOTER */
footer{background:var(--black);padding:24px 16px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;color:#666;}
footer a{color:#888;text-decoration:none;}
footer a:hover{color:var(--red);}

/* DESKTOP */
@media(min-width:768px){
  .header-inner{height:70px;padding:0 clamp(16px,4vw,48px);}
  .logo-west{font-size:24px;}
  .logo-sep,.logo-scoring{font-size:14px;}
  .breadcrumbs{padding:0 clamp(16px,4vw,48px);}
  .hero{padding:28px clamp(16px,4vw,48px) 24px;}
  .hero-name{font-size:34px;}
  .weather-card{margin:16px clamp(16px,4vw,48px) 0;}
  .section-header{padding:20px clamp(16px,4vw,48px) 8px;}
  .ring-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));padding:0 clamp(16px,4vw,48px) 8px;}
  .ring-card.single{max-width:none;}
  .stats-grid{padding:0 clamp(16px,4vw,48px) 8px;}
  footer{padding:26px clamp(16px,4vw,48px);font-size:11px;}
}
</style>
<script src="display-config.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" href="index.html">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Shows
    </a>
    <a class="logo-tap" href="index.html">
      <img class="logo-img" src="assets/logo.png" alt="WEST">
      <span class="logo-west">WEST</span><span class="logo-sep">|</span><span class="logo-scoring">Scoring.Live</span>
    </a>
  </div>
</header>

<nav class="breadcrumbs">
  <a class="bc-home" href="index.html">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="1" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="7" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="7" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/></svg>
    All Shows
  </a>
  <span class="bc-sep">&rsaquo;</span>
  <span class="bc-current" id="bcShow">Show</span>
</nav>

<div id="heroArea">
  <div class="state-box"><div class="spinner"></div><div class="state-lbl">Loading Show&hellip;</div></div>
</div>

<div id="searchArea"></div>
<div id="ringsArea"></div>
<div id="statsArea"></div>

<footer>
  <p>WEST Timing and Scoring &nbsp;&middot;&nbsp; <a href="https://www.west-solutions.com" target="_blank" rel="noopener">west-solutions.com</a> &nbsp;&middot;&nbsp; <a href="admin.html">Admin</a></p>
</footer>

<script>
const WORKER = 'https://west-worker.bill-acb.workers.dev';
const params = new URLSearchParams(location.search);
const SLUG   = params.get('slug') || '';

let showData = null;
let ringLive = {};
let liveTimers = [];

var esc = WEST.esc;

/* ── Weather helpers ─────────────────────────────── */
function weatherIcon(code) {
  if (code === 0) return '\u2600\uFE0F';           // clear
  if (code >= 1 && code <= 3) return '\u26C5';      // partly cloudy
  if (code >= 45 && code <= 48) return '\uD83C\uDF2B\uFE0F'; // fog
  if (code >= 51 && code <= 67) return '\uD83C\uDF27\uFE0F'; // rain/drizzle
  if (code >= 71 && code <= 77) return '\uD83C\uDF28\uFE0F'; // snow
  if (code >= 80 && code <= 82) return '\uD83C\uDF26\uFE0F'; // showers
  if (code >= 95 && code <= 99) return '\u26C8\uFE0F';       // thunderstorm
  return '\u2600\uFE0F';
}

function weatherDesc(code) {
  if (code === 0) return 'Clear';
  if (code >= 1 && code <= 3) return 'Partly Cloudy';
  if (code >= 45 && code <= 48) return 'Foggy';
  if (code >= 51 && code <= 55) return 'Drizzle';
  if (code >= 56 && code <= 57) return 'Freezing Drizzle';
  if (code >= 61 && code <= 65) return 'Rain';
  if (code >= 66 && code <= 67) return 'Freezing Rain';
  if (code >= 71 && code <= 77) return 'Snow';
  if (code >= 80 && code <= 82) return 'Rain Showers';
  if (code >= 95 && code <= 99) return 'Thunderstorm';
  return 'Clear';
}

function dayName(iso) {
  try {
    var d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short' });
  } catch(e) { return iso; }
}

/* ── Load show data ──────────────────────────────── */
async function loadShow() {
  if (!SLUG) {
    document.getElementById('heroArea').innerHTML =
      '<div class="state-box"><div class="state-lbl">No show specified. <a href="index.html" style="color:var(--red)">Back to shows</a></div></div>';
    return;
  }
  try {
    var r = await fetch(WORKER + '/getShow?slug=' + encodeURIComponent(SLUG));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var d = await r.json();
    showData = d;
    renderHero();
    renderRings();
    renderStats();
    renderSearch();
    startLivePolling();
    loadWeather();
  } catch(e) {
    document.getElementById('heroArea').innerHTML =
      '<div class="state-box"><div class="state-lbl">Could not load show data. <a href="index.html" style="color:var(--red)">Back to shows</a></div></div>';
  }
}

/* ── Render hero ─────────────────────────────────── */
function renderHero() {
  var s = showData.show || {};
  document.title = (s.name || SLUG) + ' \u2014 WEST Scoring Live';
  document.getElementById('bcShow').textContent = s.name || SLUG;

  var statusClass = 'status-upcoming', statusText = '\u25F7 Upcoming';
  if (s.status === 'active') { statusClass = 'status-active'; statusText = '\u25CF Active'; }
  else if (s.status === 'complete') { statusClass = 'status-complete'; statusText = '\u2713 Complete'; }

  var html = '<div class="hero">';
  html += '<div class="hero-name">' + esc(s.name) + '</div>';
  if (s.dates) html += '<div class="hero-dates">' + esc(s.dates) + '</div>';
  if (s.venue) html += '<div class="hero-venue">' + esc(s.venue) + '</div>';
  if (s.location) html += '<div class="hero-location">' + esc(s.location) + '</div>';
  html += '<div id="heroWeather" style="margin-top:6px;"></div>';
  html += '<div class="status-badge ' + statusClass + '">' + statusText + '</div>';
  html += '</div>';
  document.getElementById('heroArea').innerHTML = html;
}

/* ── Render ring cards ───────────────────────────── */
function renderRings() {
  var rings = showData.rings || [];
  var s = showData.show || {};

  // If no rings from API, show a default Ring 1 card
  var displayRings = rings.length > 0
    ? rings.slice().sort(function(a, b) { return (a.sort_order || 0) - (b.sort_order || 0); })
    : [{ ring_num: 1, ring_name: '', class_count: 0, complete_count: 0 }];
  var isSingle = displayRings.length === 1;

  var html = '<div class="section-header"><span class="section-title">Rings</span></div>';
  html += '<div class="ring-grid">';

  for (var i = 0; i < displayRings.length; i++) {
    var ring = displayRings[i];
    var rn = ring.ring_num;
    var name = ring.ring_name || ('Ring ' + rn);
    var total = ring.class_count || 0;
    var done = ring.complete_count || 0;
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    var url = 'classes.html?slug=' + encodeURIComponent(SLUG) + '&ring=' + rn + '&name=' + encodeURIComponent(s.name || SLUG);

    html += '<a class="ring-card' + (isSingle ? ' single' : '') + '" href="' + esc(url) + '" data-ring="' + rn + '">';
    html += '<div class="ring-top"><div class="ring-name">' + esc(name) + '</div><div class="ring-chevron">&rsaquo;</div></div>';
    html += '<div class="ring-meta">';
    html += '<span>' + total + ' class' + (total !== 1 ? 'es' : '') + '</span>';
    if (done > 0) html += '<span>\u00B7 ' + done + ' complete</span>';
    html += '<span class="ring-live" id="ringLive' + rn + '" style="display:none;"><span class="ring-live-dot"></span> <span id="ringLiveText' + rn + '"></span></span>';
    html += '</div>';
    html += '<div class="ring-progress"><div class="ring-progress-bar" id="ringBar' + rn + '" style="width:' + pct + '%"></div></div>';
    html += '</a>';
    var liveUrl = 'live.html?slug=' + encodeURIComponent(SLUG) + '&ring=' + rn + '&name=' + encodeURIComponent(s.name || SLUG);
    html += '<a class="ring-live-btn" id="ringLiveLink' + rn + '" href="' + esc(liveUrl) + '" style="display:none;"><span class="ring-live-dot"></span> Watch Live &mdash; ' + esc(name) + '</a>';
  }

  html += '</div>';
  document.getElementById('ringsArea').innerHTML = html;
}

/* ── Render stats ────────────────────────────────── */
function renderStats() {
  var rings = showData.rings || [];
  var totalClasses = 0, totalComplete = 0;
  for (var i = 0; i < rings.length; i++) {
    totalClasses += (rings[i].class_count || 0);
    totalComplete += (rings[i].complete_count || 0);
  }

  var html = '<div class="section-header"><span class="section-title">Show Statistics</span></div>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card" id="statEntries"><div class="stat-value stat-placeholder">&mdash;</div><div class="stat-label">Total Show Entries</div></div>';
  html += '<div class="stat-card"><div class="stat-value">' + totalClasses + '</div><div class="stat-label">Total Classes</div></div>';
  html += '<div class="stat-card"><div class="stat-value">' + totalComplete + '</div><div class="stat-label">Classes Complete</div></div>';
  html += '</div>';
  html += '<div id="epdArea"></div>';
  html += '<div id="showWeatherArea"></div>';
  document.getElementById('statsArea').innerHTML = html;

  // Fetch show weather (only if within 3 days of show start) + detailed stats
  var s2 = showData.show || {};
  if (s2.start_date) {
    var daysUntil = (new Date(s2.start_date + 'T12:00:00') - Date.now()) / 86400000;
    if (daysUntil <= 3) loadShowWeather();
  }
  loadShowStats();
}

async function loadShowStats() {
  try {
    var r = await fetch(WORKER + '/getShowStats?slug=' + encodeURIComponent(SLUG));
    if (!r.ok) return;
    var d = await r.json();
    if (!d.ok || !d.stats) return;
    var s = d.stats;

    // Update totals cards
    var el = document.getElementById('statEntries');
    if (el) el.innerHTML = '<div class="stat-value">' + s.totalEntries + '</div><div class="stat-label">Total Show Entries</div>';

    // Entries per day — add below stats grid
    if (s.entriesPerDay && s.entriesPerDay.length) {
      var epdHtml = '<div style="display:flex;gap:8px;padding:4px 16px 12px;flex-wrap:wrap;">';
      s.entriesPerDay.forEach(function(d) {
        var dayLabel = d.date;
        try {
          var dt = new Date(d.date + 'T12:00:00');
          dayLabel = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        } catch(e) {}
        epdHtml += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px 12px;text-align:center;flex:1;min-width:80px;">'
          + '<div style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;color:var(--black);">' + d.entries + ' <span style="font-family:DM Mono,monospace;font-size:10px;font-weight:600;color:var(--text-muted);">Entries</span></div>'
          + '<div style="font-family:DM Mono,monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-top:2px;">' + esc(dayLabel) + '</div>'
          + '</div>';
      });
      epdHtml += '</div>';
      var epdTarget = document.getElementById('epdArea');
      if (epdTarget) epdTarget.innerHTML = epdHtml;
    }

    // Build leaderboards
    var html = '';

    if (s.champions && s.champions.length) {
      var champByClass = {};
      s.champions.forEach(function(ch) {
        if (!champByClass[ch.class_name]) champByClass[ch.class_name] = [];
        champByClass[ch.class_name].push(ch);
      });
      var champCount = Object.keys(champByClass).length;
      html += '<div class="leader-card">';
      html += '<div class="leader-header" onclick="toggleLeader(\'champs\')">'
        + '<div class="leader-header-left"><div class="leader-title">Champions &amp; Reserve</div>'
        + '<div class="leader-preview">' + champCount + ' championship' + (champCount !== 1 ? 's' : '') + '</div></div>'
        + '<span class="leader-chevron" id="lc-champs">&#9662;</span></div>';
      html += '<div class="leader-body" id="lb-champs">';
      Object.keys(champByClass).forEach(function(className) {
        var entries = champByClass[className];
        var chRibbon = WEST.ribbon.placeRibbon(1, className, true);
        var rcRibbon = WEST.ribbon.placeRibbon(2, className, true);
        html += '<div style="padding:12px 16px;border-bottom:1px solid var(--border);">'
          + '<div style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">' + esc(className) + '</div>'
          + '<div style="display:flex;gap:16px;flex-wrap:wrap;">';
        entries.forEach(function(ch) {
          var ribbon = ch.place === '1' ? chRibbon : rcRibbon;
          html += '<div style="display:flex;align-items:center;gap:8px;">'
            + '<div style="width:32px;flex-shrink:0;">' + ribbon + '</div>'
            + '<div><div style="font-size:14px;font-weight:600;color:var(--black);">' + esc(ch.horse) + '</div>'
            + '<div style="font-size:11px;color:var(--text-muted);">' + esc(ch.rider) + '</div></div>'
            + '</div>';
        });
        html += '</div></div>';
      });
      html += '</div></div>';
    }

    if (s.topRiders && s.topRiders.length) {
      var topR = s.topRiders[0];
      html += '<div class="leader-card">';
      html += '<div class="leader-header" onclick="toggleLeader(\'riders\')">'
        + '<div class="leader-header-left"><div class="leader-title">Top Riders</div>'
        + '<div class="leader-preview">' + esc(topR.rider) + ' &mdash; ' + topR.blues + ' blue' + (topR.blues !== 1 ? 's' : '') + '</div></div>'
        + '<span class="leader-chevron" id="lc-riders">&#9662;</span></div>';
      html += '<div class="leader-body" id="lb-riders">';
      s.topRiders.forEach(function(r, i) {
        html += '<div class="leader-row">'
          + '<span class="leader-rank">' + (i + 1) + '</span>'
          + '<div class="leader-name"><div class="leader-primary">' + esc(r.rider) + '</div>'
          + '<div class="leader-secondary">' + r.classes + ' class' + (r.classes !== 1 ? 'es' : '') + '</div></div>'
          + '<div><div class="leader-stat">' + r.blues + ' blue' + (r.blues !== 1 ? 's' : '') + '</div>'
          + '<div class="leader-stat-sub">' + r.podiums + ' podium</div></div>'
          + '</div>';
      });
      html += '</div></div>';
    }

    if (s.topHorses && s.topHorses.length) {
      var topH = s.topHorses[0];
      html += '<div class="leader-card">';
      html += '<div class="leader-header" onclick="toggleLeader(\'horses\')">'
        + '<div class="leader-header-left"><div class="leader-title">Top Horses</div>'
        + '<div class="leader-preview">' + esc(topH.horse) + ' &mdash; ' + topH.blues + ' blue' + (topH.blues !== 1 ? 's' : '') + '</div></div>'
        + '<span class="leader-chevron" id="lc-horses">&#9662;</span></div>';
      html += '<div class="leader-body" id="lb-horses">';
      s.topHorses.forEach(function(h, i) {
        html += '<div class="leader-row">'
          + '<span class="leader-rank">' + (i + 1) + '</span>'
          + '<div class="leader-name"><div class="leader-primary">' + esc(h.horse) + '</div>'
          + '<div class="leader-secondary">' + esc(h.rider) + '</div></div>'
          + '<div><div class="leader-stat">' + h.blues + ' blue' + (h.blues !== 1 ? 's' : '') + '</div>'
          + '<div class="leader-stat-sub">' + h.podiums + ' podium</div></div>'
          + '</div>';
      });
      html += '</div></div>';
    }

    if (s.moneyLeaders && s.moneyLeaders.length) {
      var topM = s.moneyLeaders[0];
      html += '<div class="leader-card">';
      html += '<div class="leader-header" onclick="toggleLeader(\'money\')">'
        + '<div class="leader-header-left"><div class="leader-title">Prize Money Leaders</div>'
        + '<div class="leader-preview">' + esc(topM.horse) + ' &mdash; $' + topM.total.toLocaleString() + '</div></div>'
        + '<span class="leader-chevron" id="lc-money">&#9662;</span></div>';
      html += '<div class="leader-body" id="lb-money">';
      s.moneyLeaders.forEach(function(m, i) {
        html += '<div class="leader-row">'
          + '<span class="leader-rank">' + (i + 1) + '</span>'
          + '<div class="leader-name"><div class="leader-primary">' + esc(m.horse) + '</div>'
          + '<div class="leader-secondary">' + esc(m.rider) + '</div></div>'
          + '<div><div class="leader-stat">$' + m.total.toLocaleString() + '</div>'
          + '<div class="leader-stat-sub">' + m.classes + ' class' + (m.classes !== 1 ? 'es' : '') + '</div></div>'
          + '</div>';
      });
      html += '</div></div>';
    }

    if (html) {
      document.getElementById('statsArea').innerHTML += '<div class="section-header"><span class="section-title">Leaderboards</span></div>'
        + '<div class="leaders-section"><div class="leaders-grid">' + html + '</div></div>';
    }
  } catch(e) {
    // Stats are optional — fail silently
  }
}

/* ── Live polling per ring ───────────────────────── */
function startLivePolling() {
  // Clear any previous timers
  for (var i = 0; i < liveTimers.length; i++) clearInterval(liveTimers[i]);
  liveTimers = [];

  var rings = showData.rings || [];
  var displayRings = rings.length > 0 ? rings : [{ ring_num: 1 }];

  for (var i = 0; i < displayRings.length; i++) {
    (function(rn) {
      pollRingLive(rn);
      liveTimers.push(setInterval(function() { pollRingLive(rn); }, 10000));
    })(displayRings[i].ring_num);
  }
}

async function pollRingLive(ringNum) {
  try {
    var r = await fetch(WORKER + '/getLiveClass?slug=' + encodeURIComponent(SLUG) + '&ring=' + ringNum);
    if (!r.ok) return;
    var d = await r.json();
    ringLive[ringNum] = d;
    updateRingLiveUI(ringNum, d);
  } catch(e) {}
}

function updateRingLiveUI(ringNum, data) {
  var el = document.getElementById('ringLive' + ringNum);
  var textEl = document.getElementById('ringLiveText' + ringNum);
  if (!el || !textEl) return;

  var active = data.activeClasses || [];
  var alive = data.watcherAlive;

  // Live link — per-ring "Watch Live" button
  var liveLinkEl = document.getElementById('ringLiveLink' + ringNum);

  if (alive && active.length > 0) {
    el.style.display = 'inline-flex';
    textEl.textContent = active.length + ' class' + (active.length !== 1 ? 'es' : '') + ' in ring';
    if (liveLinkEl) liveLinkEl.style.display = 'inline-flex';
  } else {
    el.style.display = 'none';
    if (liveLinkEl) liveLinkEl.style.display = 'none';
  }
}

/* ── Weather ─────────────────────────────────────── */
async function loadWeather() {
  var s = showData.show || {};
  var loc = s.location;
  if (!loc) return;

  // Check sessionStorage cache (30 min TTL)
  var cacheKey = 'weather_' + SLUG;
  var cached = sessionStorage.getItem(cacheKey);
  if (cached) {
    try {
      var c = JSON.parse(cached);
      if (c.ts && (Date.now() - c.ts) < 30 * 60 * 1000) {
        renderWeather(c.data, loc);
        return;
      }
    } catch(e) {}
  }

  try {
    // Extract city name from location string (e.g. "Culpeper, VA" -> "Culpeper")
    var city = loc.split(',')[0].trim();
    var geoR = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
    if (!geoR.ok) return;
    var geo = await geoR.json();
    if (!geo.results || !geo.results.length) return;

    var lat = geo.results[0].latitude;
    var lon = geo.results[0].longitude;

    var wxR = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=America/New_York&forecast_days=5&temperature_unit=fahrenheit');
    if (!wxR.ok) return;
    var wx = await wxR.json();

    // Cache result
    sessionStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: wx }));
    renderWeather(wx, loc);
  } catch(e) {
    // Weather is optional — fail silently
  }
}

function renderWeather(wx, loc) {
  if (!wx || !wx.current) return;
  var cur = wx.current;
  var el = document.getElementById('heroWeather');
  if (!el) return;
  el.innerHTML = '<div style="display:flex;align-items:center;gap:8px;">'
    + '<span style="font-size:20px;">' + weatherIcon(cur.weathercode) + '</span>'
    + '<span style="font-family:Playfair Display,serif;font-size:18px;font-weight:900;color:var(--black);">' + Math.round(cur.temperature_2m) + '\u00B0F</span>'
    + '<span style="font-family:DM Mono,monospace;font-size:10px;color:var(--text-muted);letter-spacing:.04em;">' + esc(weatherDesc(cur.weathercode)) + '</span>'
    + '</div>';
}

/* ── Show-dates weather ──────────────────────────── */
async function loadShowWeather() {
  try {
    var r = await fetch(WORKER + '/getShowWeather?slug=' + encodeURIComponent(SLUG));
    if (!r.ok) return;
    var d = await r.json();
    if (!d.ok || !d.days || !d.days.length) return;

    var today = new Date().toISOString().split('T')[0];
    var html = '<div class="section-header"><span class="section-title">Show Weather</span></div>';
    html += '<div style="display:flex;gap:8px;padding:4px 16px 12px;flex-wrap:wrap;overflow-x:auto;">';
    d.days.forEach(function(day) {
      var dayLabel = day.date;
      try {
        var dt = new Date(day.date + 'T12:00:00');
        dayLabel = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      } catch(e) {}
      var isToday = day.date === today;
      var icon = weatherIcon(day.weather_code || 0);
      var precip = day.precip_mm ? (day.precip_mm / 25.4).toFixed(2) + 'in' : '';
      var wind = day.wind_max ? Math.round(day.wind_max) + 'mph' : '';
      html += '<div style="background:#fff;border:1px solid ' + (isToday ? 'var(--red)' : 'var(--border)') + ';border-radius:6px;padding:10px 12px;text-align:center;flex:1;min-width:90px;'
        + (isToday ? 'box-shadow:0 0 0 1px var(--red);' : '') + '">'
        + '<div style="font-family:DM Mono,monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:' + (isToday ? 'var(--red)' : 'var(--text-muted)') + ';margin-bottom:4px;">' + esc(dayLabel) + '</div>'
        + '<div style="font-size:24px;line-height:1;margin-bottom:4px;">' + icon + '</div>'
        + '<div style="font-family:Playfair Display,serif;font-size:16px;font-weight:900;color:var(--black);">' + Math.round(day.temp_high) + '&deg;</div>'
        + '<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--text-muted);">' + Math.round(day.temp_low) + '&deg;</div>'
        + (precip ? '<div style="font-family:DM Mono,monospace;font-size:9px;color:#64b5f6;margin-top:2px;">' + precip + '</div>' : '')
        + (wind ? '<div style="font-family:DM Mono,monospace;font-size:9px;color:#bbb;margin-top:1px;">' + wind + '</div>' : '')
        + '</div>';
    });
    html += '</div>';
    var target = document.getElementById('showWeatherArea');
    if (target) target.innerHTML = html;
  } catch(e) {}
}

/* ── Search ──────────────────────────────────────── */
function renderSearch() {
  var html = '<div class="section-header"><span class="section-title">Lookup</span></div>';
  html += '<div class="search-section"><div class="search-wrap">'
    + '<span class="search-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>'
    + '<input class="search-input" id="showSearch" type="text" placeholder="Search rider or horse..." autocomplete="off">'
    + '<button class="search-clear" id="searchClear" type="button">&times;</button>'
    + '</div><div class="search-results" id="searchResults"></div></div>';
  document.getElementById('searchArea').innerHTML = html;

  var timer = null;
  var input = document.getElementById('showSearch');
  var clearBtn = document.getElementById('searchClear');
  input.addEventListener('input', function() {
    clearTimeout(timer);
    var q = this.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    if (q.length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
    timer = setTimeout(function() { doSearch(q); }, 300);
  });
  clearBtn.addEventListener('click', function() {
    input.value = '';
    clearBtn.classList.remove('visible');
    document.getElementById('searchResults').innerHTML = '';
    input.focus();
  });
}

async function doSearch(q) {
  var el = document.getElementById('searchResults');
  try {
    var r = await fetch(WORKER + '/searchShow?slug=' + encodeURIComponent(SLUG) + '&q=' + encodeURIComponent(q));
    if (!r.ok) return;
    var d = await r.json();
    if (!d.ok || !d.results || !d.results.length) {
      el.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--text-muted);padding:8px 0;">No results for "' + esc(q) + '"</div>';
      return;
    }
    var html = '';
    d.results.forEach(function(m) {
      var breeding = [m.sire, m.dam].filter(Boolean).join(' x ');
      var locale = [m.city, m.state].filter(Boolean).join(', ');
      html += '<div class="search-match">';
      html += '<div class="search-match-header">';
      html += '<div class="search-match-horse">' + esc(m.horse || m.rider) + '</div>';
      if (m.horse && m.rider) html += '<div class="search-match-rider">' + esc(m.rider) + (locale ? ' &mdash; ' + esc(locale) : '') + '</div>';
      if (breeding) html += '<div class="search-match-meta">' + esc(breeding) + '</div>';
      if (m.owner && m.owner !== m.rider) html += '<div class="search-match-meta">Owner: ' + esc(m.owner) + '</div>';
      html += '</div>';
      m.classes.forEach(function(cl) {
        var bestRound = cl.rounds.sort(function(a, b) { return (parseInt(a.place) || 999) - (parseInt(b.place) || 999); })[0];
        var place = bestRound ? bestRound.place : '';
        var status = bestRound ? bestRound.status_code : '';
        var placeDisplay = place ? place : (status || '--');
        var resultsUrl = 'results.html?slug=' + encodeURIComponent(SLUG) + '&classNum=' + encodeURIComponent(cl.class_num) + '&ring=' + encodeURIComponent(cl.ring) + '&name=' + encodeURIComponent(showData && showData.show ? showData.show.name : SLUG);
        html += '<a class="search-class-row" href="' + esc(resultsUrl) + '" style="text-decoration:none;color:inherit;">'
          + '<span class="search-class-place">' + esc(placeDisplay) + '</span>'
          + '<span class="search-class-name">' + esc(cl.class_name) + '</span>'
          + '</a>';
      });
      html += '</div>';
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '';
  }
}

function toggleLeader(id) {
  var body = document.getElementById('lb-' + id);
  var chev = document.getElementById('lc-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

/* ── Init ────────────────────────────────────────── */
loadShow();
</script>
